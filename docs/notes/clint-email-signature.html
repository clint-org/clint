<!doctype html>
<!--
  Clint email signature -- ready to paste into Gmail.
  HOW TO INSTALL: open this file in a browser, select the framed block below
  (or Cmd+A / select-all), copy, then paste into Gmail > Settings > See all
  settings > General > Signature. See docs/notes/email-signature-stout-intro.md.

  The logo is served from https://clintapp.com/email/clint-mark.png and must be
  deployed (push to develop for dev, merge to main for prod) before the image
  shows on copy. Source PNG: src/client/public/email/clint-mark.png.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Clint email signature</title>
    <style>
      body { background:#f8fafc; margin:0; padding:40px; font-family:Arial,Helvetica,sans-serif; }
      .hint { color:#64748b; font-size:13px; margin:0 0 16px; }
      .frame { display:inline-block; background:#ffffff; padding:24px 28px; border:1px solid #e2e8f0; }
    </style>
  </head>
  <body>
    <p class="hint">Select everything inside the white frame, copy, and paste into your Gmail signature.</p>
    <div class="frame">
      <!-- ===== SIGNATURE START ===== -->
      <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;font-family:Arial,Helvetica,sans-serif;">
        <tr>
          <td style="padding:0 0 10px 0;">
            <div style="width:320px;height:2px;background-color:#0d9488;font-size:0;line-height:0;">&nbsp;</div>
          </td>
        </tr>
        <tr>
          <td>
            <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
              <tr>
                <td valign="top" style="padding-right:14px;">
                  <img src="https://clintapp.com/email/clint-mark.png" width="44" height="44" alt="Clint" style="display:block;border:0;width:44px;height:44px;" />
                </td>
                <td valign="top" style="border-left:1px solid #e2e8f0;padding-left:14px;">
                  <div style="font-size:15px;font-weight:bold;color:#0f172a;letter-spacing:-0.2px;line-height:1.2;">Aaditya Madala</div>
                  <div style="font-size:13px;color:#64748b;line-height:1.4;padding-top:1px;">Founder, Clint</div>
                  <div style="font-size:11px;color:#94a3b8;line-height:1.4;padding-top:6px;letter-spacing:0.4px;text-transform:uppercase;">Competitive intelligence for pharma</div>
                  <div style="font-size:13px;color:#475569;line-height:1.6;padding-top:8px;">
                    <a href="mailto:support@clintapp.com" style="color:#0f766e;text-decoration:none;">support@clintapp.com</a>
                    <span style="color:#cbd5e1;">&nbsp;&middot;&nbsp;</span>
                    <a href="https://clintapp.com" style="color:#0f766e;text-decoration:none;">clintapp.com</a>
                  </div>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
      <!-- ===== SIGNATURE END ===== -->
    </div>
  </body>
</html>
