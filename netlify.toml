[build]
  base = "src/client"
  command = "node scripts/set-env.js && npm ci && npx ng build --configuration production"
  publish = "dist/clinical-trial-dashboard/browser"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
