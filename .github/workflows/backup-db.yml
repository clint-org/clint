name: Backup databases
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backup-db
  cancel-in-progress: false

# Two explicit jobs (not a matrix) so every secret is referenced statically.
# Indexing `secrets[...]` with a dynamic key forces GitHub to pass the entire
# secrets context to the runner (CodeQL: actions/excessive-secrets-exposure).
jobs:
  prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Backup prod
        uses: ./.github/actions/db-backup
        with:
          environment: prod
          project_ref: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
          db_password: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
          db_url: ${{ secrets.SUPABASE_PROD_DB_POOLER_URL }}
          age_recipient: ${{ secrets.BACKUP_AGE_PUBLIC_KEY }}
          r2_bucket: ${{ secrets.R2_BACKUP_BUCKET }}
          r2_endpoint: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          r2_key_id: ${{ secrets.R2_BACKUP_ACCESS_KEY_ID }}
          r2_secret: ${{ secrets.R2_BACKUP_SECRET_ACCESS_KEY }}
          b2_bucket: ${{ secrets.B2_BACKUP_BUCKET }}
          b2_endpoint: ${{ secrets.B2_S3_ENDPOINT }}
          b2_key_id: ${{ secrets.B2_BACKUP_KEY_ID }}
          b2_app_key: ${{ secrets.B2_BACKUP_APP_KEY }}

  dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Backup dev
        uses: ./.github/actions/db-backup
        with:
          environment: dev
          project_ref: ${{ secrets.SUPABASE_DEV_PROJECT_REF }}
          db_password: ${{ secrets.SUPABASE_DEV_DB_PASSWORD }}
          db_url: ${{ secrets.SUPABASE_DEV_DB_POOLER_URL }}
          age_recipient: ${{ secrets.BACKUP_AGE_PUBLIC_KEY }}
          r2_bucket: ${{ secrets.R2_BACKUP_BUCKET }}
          r2_endpoint: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          r2_key_id: ${{ secrets.R2_BACKUP_ACCESS_KEY_ID }}
          r2_secret: ${{ secrets.R2_BACKUP_SECRET_ACCESS_KEY }}
          b2_bucket: ${{ secrets.B2_BACKUP_BUCKET }}
          b2_endpoint: ${{ secrets.B2_S3_ENDPOINT }}
          b2_key_id: ${{ secrets.B2_BACKUP_KEY_ID }}
          b2_app_key: ${{ secrets.B2_BACKUP_APP_KEY }}

  # Domain 10 (detection) in docs/runbook/14-disaster-recovery.md: a failed
  # backup must not be silent. On any failure open or update a deduplicated
  # GitHub issue. Baseline sink with no new dependency or secret; swap for
  # Slack/PagerDuty later. Least-privilege: only this job gets issues: write.
  notify-failure:
    needs: [prod, dev]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const label = 'backup-failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The scheduled database backup workflow failed.',
              '',
              `Run: ${runUrl}`,
              '',
              'Detection signal for domain 10 in docs/runbook/14-disaster-recovery.md.',
              'Investigate before the next daily window so RPO does not silently grow.',
            ].join('\n');
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });
            if (open.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'DB backup failed',
                body,
                labels: [label],
              });
            }
