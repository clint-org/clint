name: CT.gov secret drift check
# The Worker runtime secret CTGOV_WORKER_SECRET (set via `wrangler secret put`)
# must equal the Supabase vault secret ctgov_worker_secret. If they drift,
# _verify_ctgov_worker_secret raises 42501 on EVERY CT.gov ingest and the whole
# daily sync fails -- but nothing detects the drift itself; it is only inferred
# from a mass-failed run. The Worker is the only holder of the runtime secret, so
# the only reliable probe is a round-trip through it: GET /api/ctgov/secret-health
# calls the secret-gated ctgov_secret_health RPC with the Worker's secret and
# returns {ok:true|false}. This watcher hits that route on each host and alerts on
# drift, separate from the staleness check in ctgov-sync-health.yml so the cause is
# named, not inferred.
#
# NOTE: like every watcher, this only runs on schedule once it is on the default
# branch (main); and it requires the /api/ctgov/secret-health route to be deployed
# on each host first. Promote with the route (and the ctgov_secret_health
# migration) before relying on it.
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Probe CTGOV_WORKER_SECRET vs vault on each host
        env:
          HOSTS: "clintapp.com dev.clintapp.com"
        run: |
          set -uo pipefail
          fail=0
          for host in $HOSTS; do
            resp=$(curl -sS --max-time 25 "https://$host/api/ctgov/secret-health" || echo '')
            ok=$(printf '%s' "$resp" | jq -r '.ok' 2>/dev/null || echo 'unparseable')
            case "$ok" in
              true)
                echo "$host: CTGOV_WORKER_SECRET matches the vault (ok)"
                ;;
              false)
                reason=$(printf '%s' "$resp" | jq -r '.reason // "unknown"' 2>/dev/null)
                if [ "$reason" = "secret_mismatch" ]; then
                  echo "::error::$host CTGOV_WORKER_SECRET has drifted from the vault secret (42501) -- every CT.gov ingest will fail"
                else
                  echo "::error::$host secret-health probe could not verify the secret (reason=$reason)"
                fi
                fail=1
                ;;
              *)
                echo "::error::$host secret-health probe unreachable or unparseable (response: ${resp:0:160})"
                fail=1
                ;;
            esac
          done
          exit $fail

  notify-failure:
    needs: [check]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const label = 'ctgov-secret-drift';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The CT.gov worker-secret drift check failed.',
              '',
              `Run: ${runUrl}`,
              '',
              'On at least one host the Worker secret CTGOV_WORKER_SECRET no longer',
              'matches the Supabase vault secret ctgov_worker_secret (or the probe',
              'could not verify it). While drifted, _verify_ctgov_worker_secret raises',
              '42501 on every CT.gov ingest and the daily sync fails entirely.',
              '',
              'Remediate: re-set the Worker secret to match the vault --',
              '`cd src/client && npx wrangler secret put CTGOV_WORKER_SECRET` (correct',
              'Worker), then re-dispatch this check. See',
              'docs/runbook/15-observability-and-alerting.md (secret drift).',
            ].join('\n');
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });
            if (open.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'CT.gov worker-secret drift detected',
                body,
                labels: [label],
              });
            }
