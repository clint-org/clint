name: Deploy to production
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/client/package-lock.json

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link prod Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Pre-migration backup (prod)
        uses: ./.github/actions/db-backup
        with:
          environment: prod
          project_ref: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
          db_password: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
          age_recipient: ${{ secrets.BACKUP_AGE_PUBLIC_KEY }}
          tier_override: pre-migration
          r2_bucket: ${{ secrets.R2_BACKUP_BUCKET }}
          r2_endpoint: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          r2_key_id: ${{ secrets.R2_BACKUP_ACCESS_KEY_ID }}
          r2_secret: ${{ secrets.R2_BACKUP_SECRET_ACCESS_KEY }}
          b2_bucket: ${{ secrets.B2_BACKUP_BUCKET }}
          b2_endpoint: ${{ secrets.B2_S3_ENDPOINT }}
          b2_key_id: ${{ secrets.B2_BACKUP_KEY_ID }}
          b2_app_key: ${{ secrets.B2_BACKUP_APP_KEY }}

      - name: Apply migrations to prod
        # --include-all applies migration files whose timestamp predates the
        # last migration already on the remote (out-of-order inserts that land
        # when a hotfix is pushed ahead of an older feature branch). Without it
        # `db push` aborts with "Found local migration files to be inserted
        # before the last migration on remote database".
        run: supabase db push --include-all
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}

      - name: Install client deps
        run: cd src/client && npm ci

      - name: Build SPA (prod)
        run: cd src/client && npm run build

      - name: Deploy Worker (prod)
        run: cd src/client && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
