name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/client/package-lock.json
      - run: cd src/client && npm ci
      - run: cd src/client && npx ng lint
      - run: cd src/client && npx ng build

  e2e:
    needs: lint-and-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/client/package-lock.json

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Cache Supabase Docker images
        id: supabase-images-cache
        uses: actions/cache@v4
        with:
          path: ~/supabase-images.tar
          key: supabase-images-${{ runner.os }}-${{ hashFiles('supabase/config.toml') }}

      - name: Load cached Supabase images
        if: steps.supabase-images-cache.outputs.cache-hit == 'true'
        run: docker load -i ~/supabase-images.tar

      - name: Start Supabase
        run: supabase start

      - name: Save Supabase images for cache
        if: steps.supabase-images-cache.outputs.cache-hit != 'true'
        run: |
          images=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E 'supabase/|public.ecr.aws/supabase/' || true)
          if [ -n "$images" ]; then
            docker save $images -o ~/supabase-images.tar
          fi

      - name: Reset database
        run: supabase db reset

      - name: Get Supabase keys
        id: supabase
        run: |
          echo "anon_key=$(supabase status -o env | grep ANON_KEY | cut -d= -f2 | tr -d '\"')" >> $GITHUB_OUTPUT
          echo "service_role_key=$(supabase status -o env | grep SERVICE_ROLE_KEY | cut -d= -f2 | tr -d '\"')" >> $GITHUB_OUTPUT
          echo "jwt_secret=$(supabase status -o env | grep JWT_SECRET | cut -d= -f2 | tr -d '\"')" >> $GITHUB_OUTPUT
          echo "db_url=$(supabase status -o env | grep DB_URL | cut -d= -f2 | tr -d '\"')" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: cd src/client && npm ci

      - name: Run integration tests
        run: cd src/client && npm run test:integration
        env:
          SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}
          SUPABASE_JWT_SECRET: ${{ steps.supabase.outputs.jwt_secret }}
          SUPABASE_DB_URL: ${{ steps.supabase.outputs.db_url }}

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('src/client/package-lock.json') }}

      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            cd src/client && npx playwright install-deps chromium
          else
            cd src/client && npx playwright install chromium --with-deps
          fi

      - name: Run E2E tests
        run: cd src/client && npx playwright test
        env:
          CI: true
          SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: src/client/playwright-report/
          retention-days: 30

      - name: Stop Supabase
        if: always()
        run: supabase stop
