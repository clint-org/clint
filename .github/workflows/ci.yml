name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/client/package-lock.json
      - run: cd src/client && npm ci
      - run: cd src/client && npx ng lint
      - run: cd src/client && npx ng build

  e2e:
    needs: lint-and-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/client/package-lock.json

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Start Supabase
        run: supabase start

      - name: Reset database
        run: supabase db reset

      - name: Get Supabase keys
        id: supabase
        run: |
          echo "anon_key=$(supabase status -o env | grep ANON_KEY | cut -d= -f2)" >> $GITHUB_OUTPUT
          echo "service_role_key=$(supabase status -o env | grep SERVICE_ROLE_KEY | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: cd src/client && npm ci

      - name: Install Playwright browsers
        run: cd src/client && npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: cd src/client && npx playwright test
        env:
          CI: true
          SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: src/client/playwright-report/
          retention-days: 30

      - name: Stop Supabase
        if: always()
        run: supabase stop
