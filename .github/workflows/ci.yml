name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/client/package-lock.json
      - run: cd src/client && npm ci
      - run: cd src/client && npx ng lint
      - run: cd src/client && npx ng build
      - run: cd src/client && npm run test:scripts

  tests:
    needs: lint-and-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/client/package-lock.json

      - name: Install dependencies
        run: cd src/client && npm ci

      - name: Run vitest unit tests
        run: cd src/client && npm run test:units

      - name: Run worker tests
        run: cd src/client && npm run test:worker

      - name: Run playwright unit tests
        run: cd src/client && npm run test:unit

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Reset database
        run: supabase db reset

      - name: Run Supabase advisors (gate on WARN)
        # Source of truth for advisor findings: the Splinter engine the
        # dashboard uses. --local catches the auth_rls_initplan perf class
        # and basic security lints; auth_users_exposed / security_definer_view
        # only fire against --linked, so a scheduled job covers those.
        # Tightened to --fail-on warn after the 20260509120000-...0300 sweep
        # cleared the legacy 24 warnings; any regression (unwrapped auth.uid,
        # mutable search_path, multi-permissive policy, public extension)
        # blocks the build and surfaces the rule code + remediation link.
        run: supabase db advisors --local --type all --fail-on warn

      - name: Run features-drift check
        run: cd src/client && npm run features:check

      - name: Get Supabase keys
        id: supabase
        run: |
          echo "anon_key=$(supabase status -o env | grep ANON_KEY | cut -d= -f2 | tr -d '\"')" >> $GITHUB_OUTPUT
          echo "service_role_key=$(supabase status -o env | grep SERVICE_ROLE_KEY | cut -d= -f2 | tr -d '\"')" >> $GITHUB_OUTPUT
          echo "jwt_secret=$(supabase status -o env | grep JWT_SECRET | cut -d= -f2 | tr -d '\"')" >> $GITHUB_OUTPUT
          echo "db_url=$(supabase status -o env | grep DB_URL | cut -d= -f2 | tr -d '\"')" >> $GITHUB_OUTPUT

      - name: Run integration tests
        run: cd src/client && npm run test:integration
        env:
          SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}
          SUPABASE_JWT_SECRET: ${{ steps.supabase.outputs.jwt_secret }}
          SUPABASE_DB_URL: ${{ steps.supabase.outputs.db_url }}

      - name: Stop Supabase
        if: always()
        run: supabase stop
