name: Deploy to dev
on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/client/package-lock.json

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link dev Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_DEV_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply migrations to dev
        # --include-all applies migration files whose timestamp predates the
        # last migration already on the remote (out-of-order inserts that land
        # when a hotfix is pushed ahead of an older feature branch). Without it
        # `db push` aborts with "Found local migration files to be inserted
        # before the last migration on remote database".
        run: supabase db push --include-all
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DEV_DB_PASSWORD }}

      - name: Install client deps
        run: cd src/client && npm ci

      - name: Build SPA (dev)
        run: cd src/client && npm run build -- --configuration dev

      - name: Deploy Worker (dev)
        run: cd src/client && npx wrangler deploy --env dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
