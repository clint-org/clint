name: Verify DB backup
on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: backup-verify
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq age zstd jq

      # Each provider runs in its own step with that provider's STATIC secrets.
      # Deliberately not a matrix: dynamic secrets[...] indexing trips CodeQL's
      # actions/excessive-secrets-exposure.
      - name: Verify newest backup in R2
        env:
          PROVIDER: R2
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_BACKUP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_BACKUP_SECRET_ACCESS_KEY }}
          ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
          AGE_KEY: ${{ secrets.BACKUP_AGE_PRIVATE_KEY }}
        run: scripts/backup/verify-remote.sh

      - name: Verify newest backup in B2
        env:
          PROVIDER: B2
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_BACKUP_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_BACKUP_APP_KEY }}
          ENDPOINT: ${{ secrets.B2_S3_ENDPOINT }}
          BUCKET: ${{ secrets.B2_BACKUP_BUCKET }}
          AGE_KEY: ${{ secrets.BACKUP_AGE_PRIVATE_KEY }}
        run: scripts/backup/verify-remote.sh
