name: Docs Architecture Drift

# Re-runs `npm run docs:arch` on every PR that touches a source-of-truth file
# for the runbook (migrations, routes, package.json, the script itself). If the
# regenerated blocks differ from what the PR author committed, this job pushes
# the regen back to the PR branch as a follow-up commit so docs are never stale
# on `main`.
#
# Trigger paths intentionally exclude `docs/runbook/**` so the regen commit
# itself does not retrigger this workflow (loop guard).

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'src/client/src/app/app.routes.ts'
      - 'src/client/package.json'
      - 'src/client/scripts/gen-architecture.mjs'

permissions:
  contents: write

jobs:
  regen-and-commit:
    runs-on: ubuntu-latest
    # Forks cannot push to the head ref. Skip them; the diff will surface in
    # the regular CI lint/build job once the maintainer pulls the PR locally.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/client/package-lock.json

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Install client deps
        run: cd src/client && npm ci

      - name: Regenerate runbook auto-gen blocks
        run: cd src/client && npm run docs:arch

      - name: Commit regen if drift detected
        run: |
          if [ -z "$(git status --porcelain docs/runbook/)" ]; then
            echo "No drift. Auto-gen blocks already in sync with current source."
            exit 0
          fi
          echo "Drift detected. Committing regenerated blocks back to the PR branch."
          git diff --stat docs/runbook/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/runbook/
          git commit -m "chore(runbook): regenerate auto-gen blocks"
          git push origin HEAD:${{ github.head_ref }}

      - name: Stop Supabase
        if: always()
        run: supabase stop
