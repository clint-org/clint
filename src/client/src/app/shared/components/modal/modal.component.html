@if (isOpen()) {
  <dialog
    #dialog
    class="fixed inset-0 z-50 m-auto w-full max-w-lg rounded-lg bg-white p-0 shadow-xl backdrop:bg-black/50"
    [attr.aria-labelledby]="getTitleId()"
    aria-modal="true"
    role="dialog"
    (close)="onDialogClose()"
    (click)="onBackdropClick($event)"
    (keydown)="onKeydown($event)"
  >
    <div class="flex items-center justify-between border-b border-slate-200 px-6 py-4">
      <h2 [id]="getTitleId()" class="text-lg font-semibold text-slate-900">
        {{ title() }}
      </h2>
      <button
        type="button"
        class="rounded-md p-1 text-slate-400 hover:bg-slate-100 hover:text-slate-600 focus:outline-none focus:ring-2 focus:ring-teal-500"
        aria-label="Close dialog"
        (click)="closed.emit()"
      >
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <div class="px-6 py-4">
      <ng-content />
    </div>
  </dialog>
}
