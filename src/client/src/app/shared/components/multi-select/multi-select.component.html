<div class="relative" #container>
  <button
    type="button"
    class="flex w-full items-center justify-between rounded-md border border-gray-300 bg-white px-3 py-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
    [attr.aria-expanded]="isOpen()"
    [attr.aria-label]="label() + ', ' + selectedCount() + ' selected'"
    aria-haspopup="listbox"
    (click)="toggle()"
    (keydown)="onTriggerKeydown($event)"
  >
    <span class="truncate">
      {{ label() }}
      @if (selectedCount() > 0) {
        <span class="ml-1 inline-flex items-center rounded-full bg-indigo-100 px-2 py-0.5 text-xs font-medium text-indigo-700">
          {{ selectedCount() }}
        </span>
      }
    </span>
    <svg
      class="ml-2 h-4 w-4 shrink-0 text-gray-400 transition-transform"
      [class.rotate-180]="isOpen()"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      stroke-width="1.5"
      stroke="currentColor"
      aria-hidden="true"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
    </svg>
  </button>

  @if (isOpen()) {
    <div
      class="absolute z-50 mt-1 w-full min-w-[200px] rounded-md border border-gray-200 bg-white shadow-lg"
      role="listbox"
      tabindex="0"
      [attr.aria-label]="label() + ' options'"
      aria-multiselectable="true"
      (keydown)="onListKeydown($event)"
    >
      <div class="flex items-center justify-between border-b border-gray-100 px-3 py-2">
        <button
          type="button"
          class="text-xs font-medium text-indigo-600 hover:text-indigo-800 focus:outline-none focus:underline"
          (click)="selectAll()"
        >
          Select All
        </button>
        <button
          type="button"
          class="text-xs font-medium text-gray-500 hover:text-gray-700 focus:outline-none focus:underline"
          (click)="clearAll()"
        >
          Clear All
        </button>
      </div>

      <ul class="max-h-60 overflow-auto py-1">
        @for (option of options(); track option.id; let i = $index) {
          <li
            role="option"
            [attr.aria-selected]="isSelected(option.id)"
            class="flex cursor-pointer items-center px-3 py-2 text-sm text-gray-700 hover:bg-gray-50"
            [class.bg-indigo-50]="focusedIndex() === i"
            tabindex="-1"
            (click)="toggleOption(option.id)"
            (keydown.enter)="toggleOption(option.id)"
            (keydown.space)="toggleOption(option.id); $event.preventDefault()"
          >
            <span
              class="mr-2 flex h-4 w-4 shrink-0 items-center justify-center rounded border"
              [class.border-indigo-600]="isSelected(option.id)"
              [class.bg-indigo-600]="isSelected(option.id)"
              [class.border-gray-300]="!isSelected(option.id)"
              aria-hidden="true"
            >
              @if (isSelected(option.id)) {
                <svg class="h-3 w-3 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
                </svg>
              }
            </span>
            <span class="truncate">{{ option.name }}</span>
          </li>
        }
      </ul>
    </div>
  }
</div>
