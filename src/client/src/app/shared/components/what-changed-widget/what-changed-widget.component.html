<section
  class="border border-slate-200 bg-white"
  aria-label="What changed in the past 7 days"
  [attr.aria-busy]="loading() || null"
>
  <header
    class="flex items-center justify-between border-b border-slate-200 bg-slate-50/60 px-4 py-2"
  >
    <h2 class="text-[10px] font-semibold uppercase tracking-[0.12em] text-slate-500">
      What changed
    </h2>
    @if (activityLink()) {
      <a [routerLink]="activityLink()" class="section-action-link">View all</a>
    }
  </header>

  @if (loading()) {
    <ul class="divide-y divide-slate-100" aria-hidden="true">
      @for (i of skeletonRows; track i) {
        <li class="flex items-start gap-3 px-4 py-3">
          <app-skeleton w="20px" h="20px" />
          <div class="min-w-0 flex-1">
            <div class="mb-1 flex items-center gap-2">
              <app-skeleton w="44px" h="10px" />
              <app-skeleton w="120px" h="10px" />
              <app-skeleton w="80px" h="10px" />
            </div>
            <app-skeleton [block]="true" w="80%" h="13px" />
          </div>
        </li>
      }
    </ul>
  } @else if (error()) {
    <p class="px-4 py-3 text-xs text-red-600">{{ error() }}</p>
  } @else if (events().length === 0) {
    <p class="px-4 py-3 text-xs text-slate-500">No notable changes in the past 7 days.</p>
  } @else {
    <ul class="px-4">
      @for (event of events(); track event.id) {
        <li>
          <app-change-event-row [event]="event" [tenantId]="tenantId()" [spaceId]="spaceId()" />
        </li>
      }
    </ul>
  }
</section>
