@if (fadeStops(); as stops) {
  <svg:defs>
    <svg:linearGradient [attr.id]="maskId + '-grad'" x1="0" y1="0" x2="1" y2="0">
      @for (s of stops; track $index) {
        <svg:stop
          [attr.offset]="s.offset"
          stop-color="white"
          [attr.stop-opacity]="s.opacity"
        />
      }
    </svg:linearGradient>
    <svg:mask [attr.id]="maskId">
      <svg:rect
        [attr.x]="barX()"
        [attr.y]="barTop()"
        [attr.width]="barWidth()"
        [attr.height]="barHeight()"
        [attr.fill]="'url(#' + maskId + '-grad)'"
      />
    </svg:mask>
  </svg:defs>
}
<svg:rect
  [attr.x]="barX()"
  [attr.y]="8"
  [attr.width]="barWidth()"
  [attr.height]="barHeight()"
  [attr.rx]="cornerRadius"
  [attr.fill]="barColor()"
  [attr.fill-opacity]="withdrawn() ? 0.05 : 0.12"
  [attr.stroke]="barColor()"
  stroke-width="1.2"
  [attr.mask]="fadeStops() ? 'url(#' + maskId + ')' : null"
  class="cursor-pointer transition-opacity hover:fill-opacity-[0.25]"
  role="button"
  [attr.aria-label]="labelText() + ' phase'"
  tabindex="0"
  (click)="onClick()"
  (keydown.enter)="onClick()"
  (keydown.space)="onClick()"
/>
@if (barWidth() > 0) {
  <svg:text
    [attr.x]="labelX()"
    [attr.y]="barTop() + barHeight() / 2"
    dy="0.35em"
    [attr.text-anchor]="labelAnchor()"
    font-size="9"
    font-weight="600"
    class="pointer-events-none select-none"
    [attr.fill]="labelColor()"
  >
    {{ labelText() }}
  </svg:text>
}

@if (startTreatment() === 'cap') {
  <!-- Hollow start-cap: the bar's fuzzy start. The coincident Trial Start marker
       carries the date caption, so the bar no longer prints its own (that double
       print was the source of the garbled "~Q4Q4 2727" captions at year zoom). -->
  <svg:circle
    [attr.cx]="barX()"
    [attr.cy]="barTop() + barHeight() / 2"
    r="5.5"
    fill="white"
    [attr.stroke]="barColor()"
    stroke-width="1.5"
    pointer-events="none"
    aria-hidden="true"
  />
}

@if (endTreatment() === 'cap' && endCapCaption()) {
  <!-- Hollow end-cap at the right bar edge for an approximate end date. The
       coincident completion marker owns the date caption (see note above). -->
  <svg:circle
    [attr.cx]="endX()"
    [attr.cy]="barTop() + barHeight() / 2"
    r="5.5"
    fill="white"
    [attr.stroke]="barColor()"
    stroke-width="1.5"
    pointer-events="none"
    aria-hidden="true"
  />
}
