<svg:rect
  [attr.x]="barX()"
  [attr.y]="8"
  [attr.width]="barWidth()"
  [attr.height]="barHeight"
  [attr.rx]="cornerRadius"
  [attr.fill]="barColor()"
  [attr.stroke]="barColor()"
  stroke-width="1"
  stroke-opacity="0.4"
  opacity="0.75"
  class="cursor-pointer transition-opacity hover:opacity-100"
  role="button"
  [attr.aria-label]="labelText() + ' phase'"
  tabindex="0"
  (click)="onClick()"
  (keydown.enter)="onClick()"
  (keydown.space)="onClick()"
/>
@if (barWidth() > 0) {
  <svg:text
    [attr.x]="labelX()"
    [attr.y]="8 + barHeight / 2"
    dy="0.35em"
    [attr.text-anchor]="labelAnchor()"
    font-size="9"
    font-weight="600"
    class="pointer-events-none select-none"
    [attr.fill]="showLabelInside() ? insideLabelColor() : '#64748b'"
  >
    {{ labelText() }}
  </svg:text>
}
