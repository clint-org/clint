@if (fadeStops(); as stops) {
  <svg:defs>
    <svg:linearGradient [attr.id]="maskId + '-grad'" x1="0" y1="0" x2="1" y2="0">
      @for (s of stops; track $index) {
        <svg:stop
          [attr.offset]="s.offset"
          stop-color="white"
          [attr.stop-opacity]="s.opacity"
        />
      }
    </svg:linearGradient>
    <svg:mask [attr.id]="maskId">
      <svg:rect
        [attr.x]="barX()"
        [attr.y]="8"
        [attr.width]="barWidth()"
        [attr.height]="barHeight"
        [attr.fill]="'url(#' + maskId + '-grad)'"
      />
    </svg:mask>
  </svg:defs>
}
<svg:rect
  [attr.x]="barX()"
  [attr.y]="8"
  [attr.width]="barWidth()"
  [attr.height]="barHeight"
  [attr.rx]="cornerRadius"
  [attr.fill]="barColor()"
  fill-opacity="0.12"
  [attr.stroke]="barColor()"
  stroke-width="1.2"
  [attr.mask]="fadeStops() ? 'url(#' + maskId + ')' : null"
  class="cursor-pointer transition-opacity hover:fill-opacity-[0.25]"
  role="button"
  [attr.aria-label]="labelText() + ' phase'"
  tabindex="0"
  (click)="onClick()"
  (keydown.enter)="onClick()"
  (keydown.space)="onClick()"
/>
@if (barWidth() > 0) {
  <svg:text
    [attr.x]="labelX()"
    [attr.y]="8 + barHeight / 2"
    dy="0.35em"
    [attr.text-anchor]="labelAnchor()"
    font-size="9"
    font-weight="600"
    class="pointer-events-none select-none"
    [attr.fill]="labelColor()"
  >
    {{ labelText() }}
  </svg:text>
}

@if (startTreatment() === 'cap') {
  <!-- Hollow end-cap: reuses the marker range-tail token (white fill, phase ring). -->
  <svg:circle
    [attr.cx]="barX()"
    [attr.cy]="8 + barHeight / 2"
    r="5.5"
    fill="white"
    [attr.stroke]="barColor()"
    stroke-width="1.5"
    pointer-events="none"
    aria-hidden="true"
  />
  <svg:text
    [attr.x]="barX()"
    [attr.y]="8 + barHeight + 9"
    text-anchor="middle"
    font-size="8"
    class="font-mono pointer-events-none select-none"
    fill="#64748b"
    aria-hidden="true"
  >{{ startCapCaption() }}</svg:text>
}

@if (endTreatment() === 'cap' && endCapCaption()) {
  <!-- Hollow end-cap at the right bar edge for an approximate end date. -->
  <svg:circle
    [attr.cx]="endX()"
    [attr.cy]="8 + barHeight / 2"
    r="5.5"
    fill="white"
    [attr.stroke]="barColor()"
    stroke-width="1.5"
    pointer-events="none"
    aria-hidden="true"
  />
  <svg:text
    [attr.x]="endX()"
    [attr.y]="8 + barHeight + 9"
    text-anchor="middle"
    font-size="8"
    class="font-mono pointer-events-none select-none"
    fill="#64748b"
    aria-hidden="true"
  >{{ endCapCaption() }}</svg:text>
}
