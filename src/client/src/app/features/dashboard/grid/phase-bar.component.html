<svg:rect
  [attr.x]="barX()"
  [attr.y]="0"
  [attr.width]="barWidth()"
  [attr.height]="barHeight"
  [attr.rx]="cornerRadius"
  [attr.fill]="barColor()"
  class="cursor-pointer transition-opacity hover:opacity-80"
  role="button"
  [attr.aria-label]="labelText() + ' phase'"
  tabindex="0"
  (click)="onClick()"
  (keydown.enter)="onClick()"
  (keydown.space)="onClick()"
/>
@if (barWidth() > 0) {
  <svg:text
    [attr.x]="labelX()"
    [attr.y]="barHeight / 2"
    dy="0.35em"
    [attr.text-anchor]="labelAnchor()"
    class="pointer-events-none select-none text-xs"
    [attr.fill]="showLabelInside() ? '#ffffff' : barColor()"
  >
    {{ labelText() }}
  </svg:text>
}
