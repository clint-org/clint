@if (markerType(); as mt) {
  <div
    class="absolute z-10 cursor-pointer"
    style="filter: drop-shadow(0 1px 3px rgba(0,0,0,0.3))"
    [style.left.px]="markerX()"
    [style.top.px]="topOffset"
    (mouseenter)="showTooltip = true"
    (mouseleave)="showTooltip = false"
    (click)="onMarkerClick()"
    (keydown.enter)="onMarkerClick()"
    (keydown.space)="onMarkerClick()"
    tabindex="0"
    role="button"
    [attr.aria-label]="tooltipText()"
  >
    @if (isRange()) {
      <svg
        [attr.width]="rangeWidth()"
        [attr.height]="iconSize"
        class="overflow-visible"
      >
        <g app-bar-icon
          [width]="rangeWidth()"
          [height]="iconSize"
          [color]="mt.color"
          [fillStyle]="mt.fill_style"
        />
      </svg>
    } @else {
      <svg
        [attr.width]="iconSize"
        [attr.height]="iconSize"
        class="overflow-visible"
        [style.margin-left.px]="-iconSize / 2"
      >
        @switch (mt.shape) {
          @case ('circle') {
            <g app-circle-icon
              [size]="iconSize"
              [color]="mt.color"
              [fillStyle]="mt.fill_style"
            />
          }
          @case ('diamond') {
            <g app-diamond-icon
              [size]="iconSize"
              [color]="mt.color"
              [fillStyle]="mt.fill_style"
            />
          }
          @case ('flag') {
            <g app-flag-icon
              [size]="iconSize"
              [color]="mt.color"
              [fillStyle]="mt.fill_style"
            />
          }
          @case ('arrow') {
            <g app-arrow-icon
              [size]="iconSize"
              [color]="mt.color"
              [fillStyle]="mt.fill_style"
            />
          }
          @case ('x') {
            <g app-x-icon
              [size]="iconSize"
              [color]="mt.color"
              [fillStyle]="mt.fill_style"
            />
          }
          @case ('bar') {
            <g app-bar-icon
              [width]="iconSize * 2"
              [height]="iconSize"
              [color]="mt.color"
              [fillStyle]="mt.fill_style"
            />
          }
        }
      </svg>
    }

    <div
      class="text-center whitespace-nowrap font-mono leading-none"
      style="font-size: 8px; margin-top: 1px;"
      [style.color]="mt.color"
      [style.margin-left.px]="-iconSize / 2"
      [style.width.px]="iconSize * 2"
    >
      {{ shortDate() }}
    </div>

    @if (showTooltip && tooltipText()) {
      <app-marker-tooltip
        [text]="tooltipText()!"
        [typeName]="markerType()?.name ?? ''"
        [typeColor]="markerType()?.color ?? '#64748b'"
        [date]="marker().event_date"
        [isProjected]="marker().is_projected"
        [imageUrl]="marker().tooltip_image_url"
      />
    }
  </div>
}
