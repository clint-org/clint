@if (markerType(); as mt) {
  <div
    class="absolute cursor-pointer"
    [style.z-index]="showTooltip() ? 9999 : 10"
    [style.left.px]="markerX()"
    [style.top.px]="topOffset"
    (mouseenter)="showTooltip.set(true)"
    (mouseleave)="showTooltip.set(false)"
    (focus)="showTooltip.set(true)"
    (blur)="showTooltip.set(false)"
    (click)="onMarkerClick()"
    (keydown.enter)="onMarkerClick()"
    (keydown.space)="onMarkerClick()"
    tabindex="0"
    role="button"
    [attr.aria-label]="tooltipText()"
  >
    @if (isRange()) {
      <svg [attr.width]="rangeWidth()" [attr.height]="iconSize" class="overflow-visible">
        <g
          app-bar-icon
          [width]="rangeWidth()"
          [height]="iconSize"
          [color]="mt.color"
          [fillStyle]="mt.fill_style"
        />
      </svg>
    } @else {
      <div
        class="flex items-center justify-center drop-shadow-sm"
        [style.width.px]="iconSize"
        [style.height.px]="iconSize"
        [style.margin-left.px]="-iconSize / 2"
      >
        <i
          [class]="faIcon()"
          [style.color]="mt.color"
          [style.font-size.px]="iconSize - 4"
          style="-webkit-text-stroke: 0.5px white"
        ></i>
      </div>
    }

    <div
      class="text-center whitespace-nowrap font-mono leading-none text-[8px] mt-px"
      [style.color]="mt.color"
      [style.margin-left.px]="-iconSize / 2"
      [style.width.px]="iconSize * 2"
    >
      {{ shortDate() }}
    </div>

    @if (showTooltip() && tooltipText()) {
      <app-marker-tooltip
        [text]="tooltipText()!"
        [typeName]="markerType()?.name ?? ''"
        [typeColor]="markerType()?.color ?? '#64748b'"
        [date]="marker().event_date"
        [isProjected]="marker().is_projected"
        [imageUrl]="null"
      />
    }
  </div>
}
