@if (loading()) {
  <div class="flex items-center gap-2 px-2 py-1.5">
    <div class="h-4 w-4 animate-spin rounded-full border-2 border-teal-600 border-t-transparent" aria-hidden="true"></div>
    <span class="text-sm text-slate-500">Loading filters...</span>
  </div>
} @else {
  <div class="flex flex-wrap items-center gap-3 px-2 py-1.5">
    <div class="w-44">
      <app-multi-select
        label="Company"
        [options]="companyOptions()"
        [selected]="selectedCompanyIds()"
        (selectionChange)="selectedCompanyIds.set($event)"
      />
    </div>

    <div class="w-44">
      <app-multi-select
        label="Product"
        [options]="productOptions()"
        [selected]="selectedProductIds()"
        (selectionChange)="selectedProductIds.set($event)"
      />
    </div>

    <div class="w-44">
      <app-multi-select
        label="Therapeutic Area"
        [options]="taOptions()"
        [selected]="selectedTAIds()"
        (selectionChange)="selectedTAIds.set($event)"
      />
    </div>

    <div class="flex items-center gap-2">
      <label for="start-year" class="text-sm text-slate-600">From</label>
      <input
        id="start-year"
        type="number"
        class="w-20 rounded-md border border-slate-300 px-2 py-1.5 text-sm shadow-sm focus:border-teal-500 focus:ring-2 focus:ring-teal-500 focus:outline-none"
        [value]="startYear()"
        (change)="onStartYearInput($event)"
        aria-label="Start year"
      />
    </div>

    <div class="flex items-center gap-2">
      <label for="end-year" class="text-sm text-slate-600">To</label>
      <input
        id="end-year"
        type="number"
        class="w-20 rounded-md border border-slate-300 px-2 py-1.5 text-sm shadow-sm focus:border-teal-500 focus:ring-2 focus:ring-teal-500 focus:outline-none"
        [value]="endYear()"
        (change)="onEndYearInput($event)"
        aria-label="End year"
      />
    </div>
  </div>
}
