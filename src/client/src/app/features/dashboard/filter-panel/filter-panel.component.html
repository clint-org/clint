@if (loading()) {
  <div class="flex items-center gap-2">
    <p-progressspinner
      strokeWidth="4"
      [style]="{ width: '0.875rem', height: '0.875rem' }"
      aria-hidden="true"
    />
    <span class="text-xs text-slate-400" aria-live="polite">Loading...</span>
  </div>
} @else {
  <div class="flex flex-wrap items-center gap-1.5">
    <p-multiselect
      [options]="companyOptions()"
      [ngModel]="selectedCompanyIds()"
      (ngModelChange)="selectedCompanyIds.set($event)"
      placeholder="Company"
      ariaLabel="Filter by company"
      optionLabel="label"
      optionValue="value"
      display="comma"
      [filter]="true"
      [showClear]="true"
      styleClass="w-32"
      size="small"
    />

    <p-multiselect
      [options]="productOptions()"
      [ngModel]="selectedProductIds()"
      (ngModelChange)="selectedProductIds.set($event)"
      placeholder="Product"
      ariaLabel="Filter by product"
      optionLabel="label"
      optionValue="value"
      display="comma"
      [filter]="true"
      [showClear]="true"
      styleClass="w-32"
      size="small"
    />

    <p-multiselect
      [options]="taOptions()"
      [ngModel]="selectedTAIds()"
      (ngModelChange)="selectedTAIds.set($event)"
      placeholder="Therapeutic Area"
      ariaLabel="Filter by therapeutic area"
      optionLabel="label"
      optionValue="value"
      display="comma"
      [filter]="true"
      [showClear]="true"
      styleClass="w-40"
      size="small"
    />

    <p-multiselect
      [options]="statusOptions"
      [ngModel]="selectedStatuses()"
      (ngModelChange)="selectedStatuses.set($event)"
      placeholder="Status"
      ariaLabel="Filter by recruitment status"
      optionLabel="label"
      optionValue="value"
      display="comma"
      [showClear]="true"
      styleClass="w-28"
      size="small"
    />

    <p-multiselect
      [options]="phaseOptions"
      [ngModel]="selectedPhases()"
      (ngModelChange)="selectedPhases.set($event)"
      placeholder="Phase"
      ariaLabel="Filter by trial phase"
      optionLabel="label"
      optionValue="value"
      display="comma"
      [showClear]="true"
      styleClass="w-24"
      size="small"
    />

    <p-multiselect
      [options]="studyTypeOptions"
      [ngModel]="selectedStudyTypes()"
      (ngModelChange)="selectedStudyTypes.set($event)"
      placeholder="Study Type"
      ariaLabel="Filter by study type"
      optionLabel="label"
      optionValue="value"
      display="comma"
      [showClear]="true"
      styleClass="w-28"
      size="small"
    />
  </div>
}
