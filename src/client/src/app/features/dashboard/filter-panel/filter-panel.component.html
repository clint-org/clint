@if (loading()) {
  <div class="flex items-center gap-2 px-2 py-1.5">
    <p-progressspinner strokeWidth="4" [style]="{ width: '1rem', height: '1rem' }" aria-hidden="true" />
    <span class="text-sm text-slate-500">Loading filters...</span>
  </div>
} @else {
  <div class="flex flex-wrap items-center gap-3 px-2 py-1.5">
    <p-multiselect
      [options]="companyOptions()"
      [ngModel]="selectedCompanyIds()"
      (ngModelChange)="selectedCompanyIds.set($event)"
      placeholder="Company"
      optionLabel="label"
      optionValue="value"
      display="comma"
      [filter]="true"
      [showClear]="true"
      styleClass="w-44"
    />

    <p-multiselect
      [options]="productOptions()"
      [ngModel]="selectedProductIds()"
      (ngModelChange)="selectedProductIds.set($event)"
      placeholder="Product"
      optionLabel="label"
      optionValue="value"
      display="comma"
      [filter]="true"
      [showClear]="true"
      styleClass="w-44"
    />

    <p-multiselect
      [options]="taOptions()"
      [ngModel]="selectedTAIds()"
      (ngModelChange)="selectedTAIds.set($event)"
      placeholder="Therapeutic Area"
      optionLabel="label"
      optionValue="value"
      display="comma"
      [filter]="true"
      [showClear]="true"
      styleClass="w-52"
    />
  </div>
}
