@if (loading()) {
  <div class="flex items-center gap-2 px-2 py-1.5">
    <p-progressspinner
      strokeWidth="4"
      [style]="{ width: '1rem', height: '1rem' }"
      aria-hidden="true"
    />
    <span class="text-sm text-slate-500" aria-live="polite">Loading filters...</span>
  </div>
} @else {
  <div class="flex flex-wrap items-center gap-2 md:gap-3 px-2 py-1.5">
    <p-multiselect
      [options]="companyOptions()"
      [ngModel]="selectedCompanyIds()"
      (ngModelChange)="selectedCompanyIds.set($event)"
      placeholder="Company"
      ariaLabel="Filter by company"
      optionLabel="label"
      optionValue="value"
      display="comma"
      [filter]="true"
      [showClear]="true"
      styleClass="w-full sm:w-36 md:w-44"
    />

    <p-multiselect
      [options]="productOptions()"
      [ngModel]="selectedProductIds()"
      (ngModelChange)="selectedProductIds.set($event)"
      placeholder="Product"
      ariaLabel="Filter by product"
      optionLabel="label"
      optionValue="value"
      display="comma"
      [filter]="true"
      [showClear]="true"
      styleClass="w-full sm:w-36 md:w-44"
    />

    <p-multiselect
      [options]="taOptions()"
      [ngModel]="selectedTAIds()"
      (ngModelChange)="selectedTAIds.set($event)"
      placeholder="Therapeutic Area"
      ariaLabel="Filter by therapeutic area"
      optionLabel="label"
      optionValue="value"
      display="comma"
      [filter]="true"
      [showClear]="true"
      styleClass="w-full sm:w-40 md:w-52"
    />

    <p-multiselect
      [options]="statusOptions"
      [ngModel]="selectedStatuses()"
      (ngModelChange)="selectedStatuses.set($event)"
      placeholder="Status"
      ariaLabel="Filter by recruitment status"
      optionLabel="label"
      optionValue="value"
      display="comma"
      [showClear]="true"
      styleClass="w-full sm:w-32 md:w-40"
    />

    <p-multiselect
      [options]="phaseOptions"
      [ngModel]="selectedPhases()"
      (ngModelChange)="selectedPhases.set($event)"
      placeholder="Phase"
      ariaLabel="Filter by trial phase"
      optionLabel="label"
      optionValue="value"
      display="comma"
      [showClear]="true"
      styleClass="w-full sm:w-28 md:w-36"
    />

    <p-multiselect
      [options]="studyTypeOptions"
      [ngModel]="selectedStudyTypes()"
      (ngModelChange)="selectedStudyTypes.set($event)"
      placeholder="Study Type"
      ariaLabel="Filter by study type"
      optionLabel="label"
      optionValue="value"
      display="comma"
      [showClear]="true"
      styleClass="w-full sm:w-32 md:w-40"
    />
  </div>
}
