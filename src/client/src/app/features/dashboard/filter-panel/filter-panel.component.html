@if (loading()) {
  <div class="flex items-center gap-2 px-2 py-1.5">
    <p-progressspinner strokeWidth="4" [style]="{ width: '1rem', height: '1rem' }" aria-hidden="true" />
    <span class="text-sm text-slate-500">Loading filters...</span>
  </div>
} @else {
  <div class="flex flex-wrap items-center gap-3 px-2 py-1.5">
    <p-multiselect
      [options]="companyOptions()"
      [ngModel]="selectedCompanyIds()"
      (ngModelChange)="selectedCompanyIds.set($event)"
      placeholder="Company"
      optionLabel="label"
      optionValue="value"
      display="comma"
      [filter]="true"
      [showClear]="true"
      [style]="{ width: '11rem' }"
      size="small"
    />

    <p-multiselect
      [options]="productOptions()"
      [ngModel]="selectedProductIds()"
      (ngModelChange)="selectedProductIds.set($event)"
      placeholder="Product"
      optionLabel="label"
      optionValue="value"
      display="comma"
      [filter]="true"
      [showClear]="true"
      [style]="{ width: '11rem' }"
      size="small"
    />

    <p-multiselect
      [options]="taOptions()"
      [ngModel]="selectedTAIds()"
      (ngModelChange)="selectedTAIds.set($event)"
      placeholder="Therapeutic Area"
      optionLabel="label"
      optionValue="value"
      display="comma"
      [filter]="true"
      [showClear]="true"
      [style]="{ width: '11rem' }"
      size="small"
    />

    <div class="flex items-center gap-2">
      <label for="start-year" class="text-sm text-slate-600">From</label>
      <p-inputnumber
        inputId="start-year"
        [ngModel]="startYear()"
        (ngModelChange)="startYear.set($event)"
        [useGrouping]="false"
        [min]="1990"
        [max]="2040"
        [style]="{ width: '5rem' }"
        size="small"
        aria-label="Start year"
      />
    </div>

    <div class="flex items-center gap-2">
      <label for="end-year" class="text-sm text-slate-600">To</label>
      <p-inputnumber
        inputId="end-year"
        [ngModel]="endYear()"
        (ngModelChange)="endYear.set($event)"
        [useGrouping]="false"
        [min]="1990"
        [max]="2040"
        [style]="{ width: '5rem' }"
        size="small"
        aria-label="End year"
      />
    </div>
  </div>
}
