<form (ngSubmit)="onSubmit()" novalidate>
  @if (error()) {
    <p-message severity="error" [closable]="false" class="mb-4">{{ error() }}</p-message>
  }

  <app-asset-edit-form
    [(name)]="name"
    [(genericName)]="genericName"
    [(companyId)]="companyId"
    [(logoUrl)]="logoUrl"
    [(moaIds)]="selectedMoaIds"
    [(roaIds)]="selectedRoaIds"
    [(displayOrder)]="displayOrder"
    [companyOptions]="companies()"
    [moaOptions]="moaOptions()"
    [roaOptions]="roaOptions()"
    [moaCreateFn]="createMoa"
    [roaCreateFn]="createRoa"
    [nameInvalid]="nameInvalid"
    (nameBlur)="nameBlurred.set(true)"
  />

  <app-form-actions
    [submitLabel]="isEdit ? 'Update Asset' : 'Create Asset'"
    [loading]="submitting()"
    [disabled]="!canSubmit"
    (cancelled)="cancelled.emit()"
  />
</form>
