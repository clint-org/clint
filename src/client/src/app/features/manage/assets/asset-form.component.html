<form (ngSubmit)="onSubmit()" novalidate>
  @if (error()) {
    <p-message severity="error" [closable]="false" class="mb-4">{{ error() }}</p-message>
  }

  <app-form-field
    label="Name"
    fieldId="asset-name"
    [required]="true"
    [error]="nameInvalid ? 'Name is required.' : null"
  >
    <input
      pInputText
      id="asset-name"
      name="name"
      class="w-full"
      [ngModel]="name()"
      (ngModelChange)="name.set($event)"
      (blur)="nameBlurred.set(true)"
      [attr.aria-required]="true"
      [attr.aria-invalid]="nameInvalid"
      [attr.aria-describedby]="nameInvalid ? 'asset-name-error' : null"
    />
  </app-form-field>

  <app-form-field label="Generic Name" fieldId="asset-generic-name">
    <input
      pInputText
      id="asset-generic-name"
      name="genericName"
      class="w-full"
      [ngModel]="genericName()"
      (ngModelChange)="genericName.set($event)"
      placeholder="e.g. pembrolizumab"
    />
  </app-form-field>

  <app-form-field label="Company" fieldId="asset-company" [required]="true">
    <p-select
      inputId="asset-company"
      name="companyId"
      [options]="companies()"
      [ngModel]="companyId()"
      (ngModelChange)="companyId.set($event)"
      optionLabel="name"
      optionValue="id"
      placeholder="Select company"
      styleClass="w-full"
      [attr.aria-required]="true"
    />
  </app-form-field>

  <app-form-field label="Logo URL" fieldId="asset-logo-url">
    <input
      pInputText
      id="asset-logo-url"
      name="logoUrl"
      class="w-full"
      [ngModel]="logoUrl()"
      (ngModelChange)="logoUrl.set($event)"
      placeholder="https://..."
    />
  </app-form-field>

  <app-form-field label="Mechanisms of Action" fieldId="asset-moas">
    <p-multiselect
      inputId="asset-moas"
      name="moas"
      [options]="moaOptions()"
      [ngModel]="selectedMoaIds()"
      (ngModelChange)="selectedMoaIds.set($event ?? [])"
      optionLabel="name"
      optionValue="id"
      placeholder="Select mechanisms"
      [filter]="true"
      [showClear]="true"
      styleClass="w-full"
      [maxSelectedLabels]="0"
      [selectedItemsLabel]="'MOA (' + selectedMoaIds().length + ')'"
    />
  </app-form-field>

  <app-form-field label="Routes of Administration" fieldId="asset-roas">
    <p-multiselect
      inputId="asset-roas"
      name="roas"
      [options]="roaOptions()"
      [ngModel]="selectedRoaIds()"
      (ngModelChange)="selectedRoaIds.set($event ?? [])"
      optionLabel="name"
      optionValue="id"
      placeholder="Select routes"
      [filter]="true"
      [showClear]="true"
      styleClass="w-full"
      [maxSelectedLabels]="0"
      [selectedItemsLabel]="'ROA (' + selectedRoaIds().length + ')'"
    />
  </app-form-field>

  <app-form-field label="Display Order" fieldId="asset-display-order" spacing="mb-6">
    <p-inputnumber
      inputId="asset-display-order"
      name="displayOrder"
      [ngModel]="displayOrder()"
      (ngModelChange)="displayOrder.set($event)"
      styleClass="w-full"
    />
  </app-form-field>

  <app-form-actions
    [submitLabel]="isEdit ? 'Update Asset' : 'Create Asset'"
    [loading]="submitting()"
    [disabled]="!canSubmit"
    (cancelled)="cancelled.emit()"
  />
</form>
