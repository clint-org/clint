<app-form-field
  label="Name"
  fieldId="asset-name"
  [required]="true"
  [error]="nameInvalid() ? 'Name is required.' : null"
>
  <input
    pInputText
    id="asset-name"
    name="name"
    class="w-full"
    [ngModel]="name()"
    (ngModelChange)="name.set($event)"
    (blur)="nameBlur.emit()"
    [disabled]="disabled()"
    [attr.aria-required]="true"
    [attr.aria-invalid]="nameInvalid()"
    [attr.aria-describedby]="nameInvalid() ? 'asset-name-error' : null"
  />
</app-form-field>

<app-form-field label="Generic Name" fieldId="asset-generic-name">
  <input
    pInputText
    id="asset-generic-name"
    name="genericName"
    class="w-full"
    [ngModel]="genericName()"
    (ngModelChange)="genericName.set($event)"
    placeholder="e.g. pembrolizumab"
    [disabled]="disabled()"
  />
</app-form-field>

<app-form-field label="Company" fieldId="asset-company" [required]="true">
  <p-select
    inputId="asset-company"
    name="companyId"
    [options]="companyOptions()"
    [ngModel]="companyId()"
    (ngModelChange)="companyId.set($event)"
    optionLabel="name"
    optionValue="id"
    placeholder="Select company"
    styleClass="w-full"
    [disabled]="disabled() || companyLocked()"
    [attr.aria-required]="true"
  />
</app-form-field>

@if (showLogoUrl()) {
  <app-form-field label="Logo URL" fieldId="asset-logo-url">
    <input
      pInputText
      id="asset-logo-url"
      name="logoUrl"
      class="w-full"
      [ngModel]="logoUrl()"
      (ngModelChange)="logoUrl.set($event)"
      placeholder="https://..."
    />
  </app-form-field>
}

<app-form-field label="Mechanisms of Action" fieldId="asset-moas">
  <app-taxonomy-multiselect
    inputId="asset-moas"
    entityLabel="mechanism"
    [options]="moaOptions()"
    [(value)]="moaIds"
    [createFn]="moaCreateFn()"
    [disabled]="disabled()"
    placeholder="Select mechanisms"
    [selectedItemsLabel]="'MOA (' + moaIds().length + ')'"
  />
</app-form-field>

<app-form-field label="Routes of Administration" fieldId="asset-roas">
  <app-taxonomy-multiselect
    inputId="asset-roas"
    entityLabel="route"
    [options]="roaOptions()"
    [(value)]="roaIds"
    [createFn]="roaCreateFn()"
    [disabled]="disabled()"
    placeholder="Select routes"
    [selectedItemsLabel]="'ROA (' + roaIds().length + ')'"
  />
</app-form-field>

@if (showDisplayOrder()) {
  <app-form-field label="Display Order" fieldId="asset-display-order" spacing="mb-6">
    <p-inputnumber
      inputId="asset-display-order"
      name="displayOrder"
      [ngModel]="displayOrder()"
      (ngModelChange)="displayOrder.set($event)"
      styleClass="w-full"
    />
  </app-form-field>
}
