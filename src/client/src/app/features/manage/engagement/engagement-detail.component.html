<p-toast />
<p-confirm-dialog />

<app-manage-page-shell [narrow]="true">
  @if (loading()) {
    <div class="flex justify-center px-4 py-8"><app-loader [size]="28" /></div>
  } @else {
    <app-section-header label="Engagement" detail="Primary intelligence for the whole space" />

    @if (hasIntelligence()) {
      <h2
        class="mb-3 font-mono text-[11px] font-bold uppercase tracking-[0.12em] text-slate-700"
      >
        Intelligence ({{ intelligence()?.briefs?.length ?? 0 }})
      </h2>
      <app-intelligence-block
        [published]="leadBrief()?.published ?? null"
        [draft]="leadBrief()?.draft ?? null"
        [agencyView]="spaceRole.canAuthorIntelligence()"
        [canPurge]="spaceRole.canPurgeIntelligence()"
        [tenantId]="tenantIdSig()"
        [spaceId]="spaceIdSig()"
        (edit)="onIntelligenceEdit()"
        (discardDraft)="onIntelligenceDelete()"
        (withdraw)="withdrawDialogOpen.set(true)"
        (purge)="
          onPurgeRequested(
            {
              id: historyHost.payload().current?.id ?? '',
              headline: historyHost.payload().current?.headline ?? '',
            },
            false
          )
        "
      />
      @if (otherBriefs().length > 0) {
        <app-intelligence-brief-list
          [briefs]="otherBriefs()"
          [canManage]="spaceRole.canAuthorIntelligence()"
          [authorMap]="intelligence()?.authors ?? {}"
          [tenantId]="tenantIdSig()"
          [spaceId]="spaceIdSig()"
          (open)="openBriefInDrawer($event)"
          (pin)="onBriefPin($event)"
          (reorderTo)="onBriefReorder($event)"
        />
      }
      @if (spaceRole.canAuthorIntelligence()) {
        <div class="mt-2 flex justify-end">
          <button
            type="button"
            class="inline-flex items-center gap-1.5 rounded px-3 py-1.5 text-[11px] font-semibold uppercase tracking-[0.1em] text-brand-600 hover:bg-brand-50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand-600"
            (click)="openDrawerForNewBrief()"
          >
            <i class="fa-solid fa-plus text-[10px]" aria-hidden="true"></i>
            Add entry
          </button>
        </div>
      }
    } @else {
      <app-intelligence-empty
        [canEdit]="spaceRole.canAuthorIntelligence()"
        entityLabel="space"
        (add)="onIntelligenceEdit()"
      />
    }
    <app-intelligence-history-panel
      [payload]="historyHost.payload()"
      [currentUserCanEdit]="spaceRole.canAuthorIntelligence()"
      (withdraw)="withdrawDialogOpen.set(true)"
      (purgeVersion)="onPurgeRequested({ id: $event.id, headline: $event.confirmation }, false)"
      (purgeAnchor)="onPurgeRequested({ id: $event.id, headline: $event.confirmation }, true)"
    />
    <app-withdraw-intelligence-dialog
      [visible]="withdrawDialogOpen()"
      (cancelled)="withdrawDialogOpen.set(false)"
      (confirmed)="onWithdrawConfirmed($event)"
    />
    <app-purge-intelligence-dialog
      [visible]="purgeDialogOpen()"
      [headline]="purgeTargetHeadline()"
      [purgeAnchor]="purgeAnchorMode()"
      (cancelled)="purgeDialogOpen.set(false)"
      (confirmed)="onPurgeConfirmed($event)"
    />

    <section
      class="materials-section mb-4 border border-slate-200 bg-white"
      aria-label="Space materials"
    >
      <header
        class="flex items-center justify-between border-b border-slate-200 bg-slate-50/60 px-5 py-2.5"
      >
        <h2 class="font-mono text-[10px] font-bold uppercase tracking-[0.12em] text-slate-500">
          Materials
        </h2>
      </header>
      <app-materials-section
        entityType="space"
        [entityId]="spaceIdSig()"
        [spaceId]="spaceIdSig()"
      />
    </section>

    @if (spaceIdSig()) {
      <app-intelligence-drawer
        [visible]="drawerOpen()"
        [anchorId]="drawerAnchorId()"
        [spaceId]="spaceIdSig()"
        entityType="space"
        [entityId]="spaceIdSig()"
        (closed)="onIntelligenceClosed()"
        (published)="onIntelligencePublished()"
      />
    }
  }
</app-manage-page-shell>
