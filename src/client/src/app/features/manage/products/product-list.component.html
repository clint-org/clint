<div class="p-4">
  <div class="mb-4 flex items-center justify-between">
    <h1 class="text-xl font-semibold text-slate-900">Products</h1>
    <p-button label="Add Product" icon="fa-solid fa-plus" size="small" (onClick)="openCreateModal()" />
  </div>

  <p-table [value]="products()" [loading]="loading()" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template #header>
      <tr>
        <th>Name</th>
        <th>Generic Name</th>
        <th>Company</th>
        <th>Order</th>
        <th class="text-right">Actions</th>
      </tr>
    </ng-template>
    <ng-template #body let-product>
      <tr>
        <td class="font-medium">{{ product.name }}</td>
        <td class="text-slate-500">{{ product.generic_name ?? '-' }}</td>
        <td class="text-slate-500">{{ getCompanyName(product.company_id) }}</td>
        <td class="text-slate-500">{{ product.display_order }}</td>
        <td class="text-right">
          <p-button label="Edit" [text]="true" size="small" (onClick)="openEditModal(product)" class="mr-1" />
          <p-button label="Delete" [text]="true" severity="danger" size="small" (onClick)="confirmDelete(product)" />
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="5" class="text-center text-sm text-slate-500 py-8">
          No products found. Add one to get started.
        </td>
      </tr>
    </ng-template>
  </p-table>

  @if (deleteError()) {
    <p-message severity="error" [closable]="false" class="mt-4">{{ deleteError() }}</p-message>
  }
</div>

<p-dialog
  [header]="editingProduct() ? 'Edit Product' : 'Add Product'"
  [(visible)]="modalOpen"
  [modal]="true"
  [style]="{ width: '32rem' }"
  (onHide)="closeModal()"
>
  <app-product-form
    [product]="editingProduct()"
    (saved)="onSaved()"
    (cancelled)="closeModal()"
  />
</p-dialog>
