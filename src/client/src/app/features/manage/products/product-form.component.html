<form (ngSubmit)="onSubmit()" novalidate>
  @if (error()) {
    <p-message severity="error" [closable]="false" class="mb-4">{{ error() }}</p-message>
  }

  <app-form-field
    label="Name"
    fieldId="product-name"
    [required]="true"
    [error]="nameInvalid ? 'Name is required.' : null"
  >
    <input
      pInputText
      id="product-name"
      class="w-full"
      [ngModel]="name()"
      (ngModelChange)="name.set($event)"
      (blur)="nameBlurred.set(true)"
      [attr.aria-required]="true"
      [attr.aria-invalid]="nameInvalid"
      [attr.aria-describedby]="nameInvalid ? 'product-name-error' : null"
    />
  </app-form-field>

  <app-form-field label="Generic Name" fieldId="product-generic-name">
    <input
      pInputText
      id="product-generic-name"
      class="w-full"
      [ngModel]="genericName()"
      (ngModelChange)="genericName.set($event)"
      placeholder="e.g. pembrolizumab"
    />
  </app-form-field>

  <app-form-field label="Company" fieldId="product-company">
    <p-select
      inputId="product-company"
      [options]="companies()"
      [ngModel]="companyId()"
      (ngModelChange)="companyId.set($event)"
      optionLabel="name"
      optionValue="id"
      [style]="{ width: '100%' }"
    />
  </app-form-field>

  <app-form-field label="Logo URL" fieldId="product-logo-url">
    <input
      pInputText
      id="product-logo-url"
      class="w-full"
      [ngModel]="logoUrl()"
      (ngModelChange)="logoUrl.set($event)"
      placeholder="https://..."
    />
  </app-form-field>

  <app-form-field label="Display Order" fieldId="product-display-order" spacing="mb-6">
    <p-inputnumber
      inputId="product-display-order"
      [ngModel]="displayOrder()"
      (ngModelChange)="displayOrder.set($event)"
      [style]="{ width: '100%' }"
    />
  </app-form-field>

  <app-form-actions
    [submitLabel]="isEdit ? 'Update Product' : 'Create Product'"
    [loading]="submitting()"
    (cancelled)="cancelled.emit()"
  />
</form>
