<form (ngSubmit)="onSubmit()" novalidate>
  @if (error()) {
    <p-message severity="error" [closable]="false" class="mb-4">{{ error() }}</p-message>
  }

  <div class="mb-4">
    <label for="product-name" class="mb-1 block text-sm font-medium text-slate-700">Name</label>
    <input pInputText id="product-name" class="w-full" [ngModel]="name()" (ngModelChange)="name.set($event)" (blur)="nameBlurred.set(true)" [attr.aria-required]="true" [attr.aria-invalid]="nameInvalid" />
    @if (nameInvalid) {
      <p class="mt-1 text-sm text-red-600">Name is required.</p>
    }
  </div>

  <div class="mb-4">
    <label for="product-generic-name" class="mb-1 block text-sm font-medium text-slate-700">Generic Name</label>
    <input pInputText id="product-generic-name" class="w-full" [ngModel]="genericName()" (ngModelChange)="genericName.set($event)" />
  </div>

  <div class="mb-4">
    <label for="product-company" class="mb-1 block text-sm font-medium text-slate-700">Company</label>
    <p-select
      inputId="product-company"
      [options]="companies()"
      [ngModel]="companyId()"
      (ngModelChange)="companyId.set($event)"
      optionLabel="name"
      optionValue="id"
      [style]="{ width: '100%' }"
    />
  </div>

  <div class="mb-4">
    <label for="product-logo-url" class="mb-1 block text-sm font-medium text-slate-700">Logo URL</label>
    <input pInputText id="product-logo-url" class="w-full" [ngModel]="logoUrl()" (ngModelChange)="logoUrl.set($event)" />
  </div>

  <div class="mb-6">
    <label for="product-display-order" class="mb-1 block text-sm font-medium text-slate-700">Display Order</label>
    <p-inputnumber inputId="product-display-order" [ngModel]="displayOrder()" (ngModelChange)="displayOrder.set($event)" [style]="{ width: '100%' }" />
  </div>

  <div class="flex justify-end gap-3">
    <p-button label="Cancel" severity="secondary" [outlined]="true" (onClick)="cancelled.emit()" />
    <p-button [label]="isEdit ? 'Update' : 'Create'" type="submit" [loading]="submitting()" />
  </div>
</form>
