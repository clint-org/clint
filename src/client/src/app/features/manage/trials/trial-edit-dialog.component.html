<p-dialog
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  header="Edit trial details"
  [modal]="true"
  styleClass="!w-[32rem]"
  [closeOnEscape]="true"
>
  <form (ngSubmit)="save()" novalidate>
    <app-form-field label="Name" fieldId="edit-trial-name" [required]="true">
      <input
        id="edit-trial-name"
        type="text"
        pInputText
        class="w-full"
        [ngModel]="name()"
        (ngModelChange)="name.set($event)"
        name="name"
        required
        aria-required="true"
      />
    </app-form-field>

    <app-form-field label="NCT identifier (optional)" fieldId="edit-trial-nct">
      <input
        id="edit-trial-nct"
        type="text"
        pInputText
        class="w-full"
        [ngModel]="identifier()"
        (ngModelChange)="identifier.set($event)"
        name="identifier"
        placeholder="NCT12345678"
      />
      <p class="mt-1 text-[11px] text-slate-500">
        Format: NCT followed by 8 digits. Sync from CT.gov runs after save.
      </p>
    </app-form-field>

    <app-form-field label="Assets" fieldId="edit-trial-assets" [required]="true">
      <p-multiselect
        inputId="edit-trial-assets"
        [options]="products()"
        optionLabel="name"
        optionValue="id"
        [ngModel]="assetIds()"
        (ngModelChange)="onAssetsChange($event)"
        name="assets"
        placeholder="Select assets"
        [filter]="true"
        styleClass="w-full"
        appendTo="body"
        [attr.aria-required]="true"
      />
      <p class="mt-1 text-[11px] text-slate-500">
        A trial can test more than one asset (e.g. a master protocol).
      </p>
    </app-form-field>

    @if (assetIds().length > 1) {
      <app-form-field label="Primary asset" fieldId="edit-trial-primary" [required]="true">
        <p-select
          inputId="edit-trial-primary"
          [options]="primaryOptions()"
          optionLabel="name"
          optionValue="id"
          [ngModel]="primaryAssetId()"
          (ngModelChange)="primaryAssetId.set($event)"
          name="primaryAsset"
          placeholder="Select primary asset"
          styleClass="w-full"
          appendTo="body"
          [attr.aria-required]="true"
        />
      </app-form-field>
    }

    <app-form-field label="Indication" fieldId="edit-trial-indication">
      <p-select
        inputId="edit-trial-indication"
        [options]="indications()"
        optionLabel="name"
        optionValue="id"
        [ngModel]="null"
        name="indication"
        placeholder="Select indication (optional)"
        [filter]="true"
        [showClear]="true"
        styleClass="w-full"
        appendTo="body"
      />
    </app-form-field>

    <app-form-field label="Phase" fieldId="phase-type">
      <span labelSuffix>
        @if (phaseTypeLocked()) {
          <span
            class="ml-1 rounded-sm border border-slate-200 bg-slate-50 px-1 py-px font-mono text-[9px] uppercase tracking-wider text-slate-500"
          >
            ct.gov
          </span>
        }
      </span>
      <p-select
        inputId="phase-type"
        [options]="phaseOptions()"
        optionLabel="name"
        optionValue="id"
        [ngModel]="phaseType()"
        (ngModelChange)="phaseType.set($event)"
        name="phaseType"
        [disabled]="phaseTypeLocked()"
        placeholder="Select a phase"
        [showClear]="true"
        styleClass="w-full"
        appendTo="body"
        [pTooltip]="
          phaseTypeLocked()
            ? 'Managed by ct.gov. Edit at clinicaltrials.gov or remove the NCT to override.'
            : ''
        "
        tooltipPosition="top"
      />
    </app-form-field>

    <div class="grid grid-cols-2 gap-4">
      <app-form-field label="Phase start" fieldId="phase-start" spacing="">
        <span labelSuffix>
          @if (phaseStartLocked()) {
            <span
              class="ml-1 rounded-sm border border-slate-200 bg-slate-50 px-1 py-px font-mono text-[9px] uppercase tracking-wider text-slate-500"
              >ct.gov</span
            >
          }
        </span>
        <p-datepicker
          inputId="phase-start"
          [ngModel]="phaseStartDate()"
          (ngModelChange)="setPhaseStartDate($event)"
          name="phaseStart"
          dateFormat="yy-mm-dd"
          styleClass="w-full"
          [disabled]="phaseStartLocked()"
          [showIcon]="true"
          appendTo="body"
          [pTooltip]="phaseStartLocked() ? 'Managed by ct.gov.' : ''"
          tooltipPosition="top"
        />
      </app-form-field>

      <app-form-field label="Phase end" fieldId="phase-end" spacing="">
        <span labelSuffix>
          @if (phaseEndLocked()) {
            <span
              class="ml-1 rounded-sm border border-slate-200 bg-slate-50 px-1 py-px font-mono text-[9px] uppercase tracking-wider text-slate-500"
              >ct.gov</span
            >
          }
        </span>
        <p-datepicker
          inputId="phase-end"
          [ngModel]="phaseEndDate()"
          (ngModelChange)="setPhaseEndDate($event)"
          name="phaseEnd"
          dateFormat="yy-mm-dd"
          styleClass="w-full"
          [disabled]="phaseEndLocked()"
          [showIcon]="true"
          appendTo="body"
          [pTooltip]="phaseEndLocked() ? 'Managed by ct.gov.' : ''"
          tooltipPosition="top"
        />
      </app-form-field>
    </div>

    <app-form-actions
      submitLabel="Save"
      [loading]="saving()"
      [disabled]="!isValid() || saving()"
      (cancelled)="close()"
    />
  </form>
</p-dialog>
