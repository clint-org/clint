<p-dialog
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  header="Edit trial details"
  [modal]="true"
  styleClass="!w-[32rem]"
  [closeOnEscape]="true"
>
  <form (ngSubmit)="save()" novalidate>
    <app-trial-edit-form
      [(name)]="name"
      [(identifier)]="identifier"
      [(assetIds)]="assetIds"
      [(primaryAssetId)]="primaryAssetId"
      [(indicationIds)]="indicationIds"
      [(phaseType)]="phaseType"
      [(phaseStart)]="phaseStart"
      [(phaseEnd)]="phaseEnd"
      [assetOptions]="products()"
      [indicationOptions]="indications()"
      [indicationCreateFn]="createIndication"
      [phaseOptions]="phaseOptions()"
      [phaseTypeLocked]="phaseTypeLocked()"
      [phaseStartLocked]="phaseStartLocked()"
      [phaseEndLocked]="phaseEndLocked()"
    />

    @if (showNoIndicationNote()) {
      <p class="mb-3 text-[11px] leading-snug text-amber-700">
        No indication set. This trial will appear under <span class="italic">Unspecified</span>
        until you classify it.
      </p>
    }

    <app-form-actions
      submitLabel="Save"
      [loading]="saving()"
      [disabled]="!isValid() || saving()"
      (cancelled)="close()"
    />
  </form>
</p-dialog>
