<form (ngSubmit)="onSubmit()" class="space-y-4">
  @if (error()) {
    <p-message severity="error" [closable]="false">{{ error() }}</p-message>
  }
  @if (syncSuccess()) {
    <p-message severity="success" [closable]="true">{{ syncSuccess() }}</p-message>
  }

  <app-section-card title="Basic info">
    <div class="grid grid-cols-1 gap-x-6 gap-y-3 sm:grid-cols-2">
      <app-form-field label="Name" fieldId="trial-name" [required]="true" spacing="sm:col-span-2">
        <input
          pInputText
          id="trial-name"
          class="w-full"
          [(ngModel)]="name"
          name="name"
          required
          placeholder="e.g. KEYNOTE-522"
        />
      </app-form-field>

      <app-form-field label="NCT identifier" fieldId="trial-identifier" spacing="">
        <div class="flex gap-2">
          <input
            pInputText
            id="trial-identifier"
            class="flex-1"
            [(ngModel)]="identifier"
            name="identifier"
            placeholder="NCT12345678"
          />
          @if (isNctId) {
            <p-button
              label="Sync from CT.gov"
              icon="fa-solid fa-rotate"
              severity="secondary"
              [outlined]="true"
              size="small"
              [loading]="syncing()"
              (onClick)="syncFromCtgov()"
            />
          }
        </div>
        @if (ctgovLastSyncedAt) {
          <p class="mt-1 font-mono text-[10px] uppercase tracking-wider text-slate-400">
            Last synced {{ ctgovLastSyncedAt | date: 'medium' }}
          </p>
        }
      </app-form-field>

      <app-form-field label="Status" fieldId="trial-status" spacing="">
        <p-select
          inputId="trial-status"
          [options]="statusOptions"
          [(ngModel)]="status"
          name="status"
          optionLabel="label"
          optionValue="value"
          placeholder="Select status"
          [showClear]="true"
          [style]="{ width: '100%' }"
          [styleClass]="status ? 'has-value' : ''"
        />
      </app-form-field>

      <app-form-field label="Product" fieldId="trial-product" spacing="">
        <p-select
          inputId="trial-product"
          [options]="products()"
          [(ngModel)]="productId"
          name="productId"
          optionLabel="name"
          optionValue="id"
          placeholder="Select product"
          [showClear]="true"
          [style]="{ width: '100%' }"
          [styleClass]="productId ? 'has-value' : ''"
        />
      </app-form-field>

      <app-form-field label="Therapeutic area" fieldId="trial-ta" spacing="">
        <p-select
          inputId="trial-ta"
          [options]="therapeuticAreas()"
          [(ngModel)]="therapeuticAreaId"
          name="therapeuticAreaId"
          optionLabel="name"
          optionValue="id"
          placeholder="Select therapeutic area"
          [showClear]="true"
          [style]="{ width: '100%' }"
          [styleClass]="therapeuticAreaId ? 'has-value' : ''"
        />
      </app-form-field>

      <app-form-field label="Sample size" fieldId="trial-sample-size" spacing="">
        <p-inputnumber
          inputId="trial-sample-size"
          [(ngModel)]="sampleSize"
          name="sampleSize"
          [min]="0"
          [style]="{ width: '100%' }"
        />
      </app-form-field>

      <app-form-field label="Display order" fieldId="trial-display-order" spacing="">
        <p-inputnumber
          inputId="trial-display-order"
          [(ngModel)]="displayOrder"
          name="displayOrder"
          [min]="0"
          [style]="{ width: '100%' }"
        />
      </app-form-field>

      <app-form-field label="Notes" fieldId="trial-notes" spacing="sm:col-span-2">
        <textarea
          pTextarea
          id="trial-notes"
          [(ngModel)]="notes"
          name="notes"
          rows="2"
          class="w-full"
          placeholder="Additional notes"
        ></textarea>
      </app-form-field>
    </div>
  </app-section-card>

  <app-section-card title="Study design">
    <div class="grid grid-cols-1 gap-x-6 gap-y-3 sm:grid-cols-2">
      <app-form-field label="Study type" fieldId="trial-study-type" spacing="">
        <p-select
          inputId="trial-study-type"
          [options]="studyTypeOptions"
          [(ngModel)]="studyType"
          name="studyType"
          optionLabel="label"
          optionValue="value"
          placeholder="Select study type"
          [showClear]="true"
          [style]="{ width: '100%' }"
          [styleClass]="studyType ? 'has-value' : ''"
        />
      </app-form-field>
      <app-form-field label="Phase" fieldId="trial-phase" spacing="">
        <p-select
          inputId="trial-phase"
          [options]="phaseOptions"
          [(ngModel)]="phase"
          name="phase"
          optionLabel="label"
          optionValue="value"
          placeholder="Select phase"
          [showClear]="true"
          [style]="{ width: '100%' }"
          [styleClass]="phase ? 'has-value' : ''"
        />
      </app-form-field>
      <app-form-field label="Masking" fieldId="trial-masking" spacing="">
        <p-select
          inputId="trial-masking"
          [options]="maskingOptions"
          [(ngModel)]="designMasking"
          name="designMasking"
          optionLabel="label"
          optionValue="value"
          placeholder="Select masking"
          [showClear]="true"
          [style]="{ width: '100%' }"
          [styleClass]="designMasking ? 'has-value' : ''"
        />
      </app-form-field>
      <app-form-field label="Primary purpose" fieldId="trial-purpose" spacing="">
        <p-select
          inputId="trial-purpose"
          [options]="purposeOptions"
          [(ngModel)]="designPrimaryPurpose"
          name="designPrimaryPurpose"
          optionLabel="label"
          optionValue="value"
          placeholder="Select purpose"
          [showClear]="true"
          [style]="{ width: '100%' }"
          [styleClass]="designPrimaryPurpose ? 'has-value' : ''"
        />
      </app-form-field>
      <app-form-field label="Intervention type" fieldId="trial-intervention-type" spacing="">
        <input
          pInputText
          id="trial-intervention-type"
          class="w-full"
          [(ngModel)]="interventionType"
          name="interventionType"
          placeholder="e.g. Drug, Biologic, Device"
        />
      </app-form-field>
      <app-form-field label="Intervention name" fieldId="trial-intervention-name" spacing="">
        <input
          pInputText
          id="trial-intervention-name"
          class="w-full"
          [(ngModel)]="interventionName"
          name="interventionName"
          placeholder="Drug/device name"
        />
      </app-form-field>
    </div>
  </app-section-card>

  <app-section-card title="Phase">
    <div class="grid grid-cols-1 gap-x-6 gap-y-3 sm:grid-cols-2">
      <app-form-field label="Phase type" fieldId="trial-phase-type" spacing="">
        <p-select
          inputId="trial-phase-type"
          [options]="phaseTypeOptions"
          [ngModel]="phaseType()"
          (ngModelChange)="phaseType.set($event)"
          name="phaseType"
          optionLabel="label"
          optionValue="value"
          placeholder="Select phase type"
          [showClear]="true"
          [style]="{ width: '100%' }"
          [styleClass]="phaseType() ? 'has-value' : ''"
        />
      </app-form-field>
      <app-form-field label="Phase start date" fieldId="trial-phase-start-date" spacing="">
        <input
          pInputText
          type="date"
          id="trial-phase-start-date"
          class="w-full"
          [ngModel]="phaseStartDate()"
          (ngModelChange)="phaseStartDate.set($event)"
          name="phaseStartDate"
        />
      </app-form-field>
      <app-form-field label="Phase end date" fieldId="trial-phase-end-date" spacing="">
        <input
          pInputText
          type="date"
          id="trial-phase-end-date"
          class="w-full"
          [ngModel]="phaseEndDate()"
          (ngModelChange)="phaseEndDate.set($event)"
          name="phaseEndDate"
        />
      </app-form-field>
    </div>
  </app-section-card>

  <app-section-card title="Eligibility">
    <div class="grid grid-cols-1 gap-x-6 gap-y-3 sm:grid-cols-2">
      <app-form-field label="Sex" fieldId="trial-sex" spacing="">
        <p-select
          inputId="trial-sex"
          [options]="sexOptions"
          [(ngModel)]="eligibilitySex"
          name="eligibilitySex"
          optionLabel="label"
          optionValue="value"
          placeholder="Select sex"
          [showClear]="true"
          [style]="{ width: '100%' }"
          [styleClass]="eligibilitySex ? 'has-value' : ''"
        />
      </app-form-field>
      <app-form-field label="Min age" fieldId="trial-min-age" spacing="">
        <input
          pInputText
          id="trial-min-age"
          class="w-full"
          [(ngModel)]="eligibilityMinAge"
          name="eligibilityMinAge"
          placeholder="e.g. 18 Years"
        />
      </app-form-field>
      <app-form-field label="Max age" fieldId="trial-max-age" spacing="">
        <input
          pInputText
          id="trial-max-age"
          class="w-full"
          [(ngModel)]="eligibilityMaxAge"
          name="eligibilityMaxAge"
          placeholder="e.g. 65 Years"
        />
      </app-form-field>
      <div class="flex items-end pb-1">
        <p-checkbox
          [(ngModel)]="acceptsHealthyVolunteers"
          name="acceptsHealthyVolunteers"
          [binary]="true"
          inputId="trial-healthy"
        />
        <label
          for="trial-healthy"
          class="ml-2 text-[11px] font-medium uppercase tracking-wider text-slate-600"
        >
          Accepts healthy volunteers
        </label>
      </div>
    </div>
  </app-section-card>

  <app-section-card title="Timeline">
    <div class="grid grid-cols-1 gap-x-6 gap-y-3 sm:grid-cols-2">
      <app-form-field label="Start date" fieldId="trial-start-date" spacing="">
        <input
          pInputText
          type="date"
          id="trial-start-date"
          class="w-full"
          [(ngModel)]="startDateStr"
          name="startDateStr"
        />
      </app-form-field>
      <app-form-field label="Primary completion date" fieldId="trial-pcd" spacing="">
        <input
          pInputText
          type="date"
          id="trial-pcd"
          class="w-full"
          [(ngModel)]="primaryCompletionDateStr"
          name="primaryCompletionDateStr"
        />
      </app-form-field>
      <app-form-field label="Lead sponsor" fieldId="trial-lead-sponsor" spacing="">
        <input
          pInputText
          id="trial-lead-sponsor"
          class="w-full"
          [(ngModel)]="leadSponsor"
          name="leadSponsor"
        />
      </app-form-field>
      <app-form-field label="Recruitment status" fieldId="trial-recruitment" spacing="">
        <input
          pInputText
          id="trial-recruitment"
          class="w-full"
          [(ngModel)]="recruitmentStatus"
          name="recruitmentStatus"
          placeholder="e.g. Recruiting, Completed"
        />
      </app-form-field>
    </div>
  </app-section-card>

  <app-section-card title="Regulatory">
    <div class="grid grid-cols-1 gap-x-6 gap-y-3 sm:grid-cols-2">
      <app-form-field
        label="FDA designations"
        fieldId="trial-fda-designations"
        spacing="sm:col-span-2"
      >
        <p-multiselect
          inputId="trial-fda-designations"
          [options]="fdaDesignationOptions"
          [ngModel]="fdaDesignations"
          (ngModelChange)="fdaDesignations = $event ?? []"
          name="fdaDesignations"
          optionLabel="label"
          optionValue="value"
          placeholder="Select designations"
          [showClear]="true"
          [style]="{ width: '100%' }"
          [styleClass]="fdaDesignations.length ? 'has-value' : ''"
          [maxSelectedLabels]="1"
          [selectedItemsLabel]="'Designation (' + fdaDesignations.length + ')'"
        />
      </app-form-field>
      <div class="flex flex-wrap items-center gap-x-6 gap-y-2 sm:col-span-2">
        <div class="flex items-center">
          <p-checkbox [(ngModel)]="hasDmc" name="hasDmc" [binary]="true" inputId="trial-dmc" />
          <label
            for="trial-dmc"
            class="ml-2 text-[11px] font-medium uppercase tracking-wider text-slate-600"
          >
            Has DMC
          </label>
        </div>
        <div class="flex items-center">
          <p-checkbox
            [(ngModel)]="isFdaRegulatedDrug"
            name="isFdaRegulatedDrug"
            [binary]="true"
            inputId="trial-fda-drug"
          />
          <label
            for="trial-fda-drug"
            class="ml-2 text-[11px] font-medium uppercase tracking-wider text-slate-600"
          >
            FDA regulated drug
          </label>
        </div>
        <div class="flex items-center">
          <p-checkbox
            [(ngModel)]="isFdaRegulatedDevice"
            name="isFdaRegulatedDevice"
            [binary]="true"
            inputId="trial-fda-device"
          />
          <label
            for="trial-fda-device"
            class="ml-2 text-[11px] font-medium uppercase tracking-wider text-slate-600"
          >
            FDA regulated device
          </label>
        </div>
      </div>
    </div>
  </app-section-card>

  <app-form-actions
    [submitLabel]="trial() ? 'Update trial' : 'Create trial'"
    [loading]="saving()"
    (cancelled)="cancelled.emit()"
  />
</form>
