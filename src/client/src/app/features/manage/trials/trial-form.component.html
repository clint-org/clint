<form (ngSubmit)="onSubmit()" class="space-y-4">
  @if (error()) {
    <p-message severity="error" [closable]="false">{{ error() }}</p-message>
  }
  @if (syncSuccess()) {
    <p-message severity="success" [closable]="true">{{ syncSuccess() }}</p-message>
  }

  <!-- Basic Info -->
  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
    <app-form-field label="Name" fieldId="trial-name" [required]="true" spacing="sm:col-span-2">
      <input
        pInputText
        id="trial-name"
        class="w-full mt-1"
        [(ngModel)]="name"
        name="name"
        required
        placeholder="Trial name"
      />
    </app-form-field>

    <app-form-field label="NCT Identifier" fieldId="trial-identifier" spacing="">
      <div class="flex gap-2 mt-1">
        <input
          pInputText
          id="trial-identifier"
          class="flex-1"
          [(ngModel)]="identifier"
          name="identifier"
          placeholder="e.g. NCT12345678"
        />
        @if (isNctId) {
          <p-button
            label="Sync from CT.gov"
            icon="fa-solid fa-rotate"
            size="small"
            [loading]="syncing()"
            (onClick)="syncFromCtgov()"
          />
        }
      </div>
      @if (ctgovLastSyncedAt) {
        <p class="mt-1 text-xs text-slate-400">
          Last synced: {{ ctgovLastSyncedAt | date: 'medium' }}
        </p>
      }
    </app-form-field>

    <app-form-field label="Status" fieldId="trial-status" spacing="">
      <p-select
        inputId="trial-status"
        [options]="statusOptions"
        [(ngModel)]="status"
        name="status"
        optionLabel="label"
        optionValue="value"
        placeholder="Select status"
        [showClear]="true"
        [style]="{ width: '100%' }"
        class="mt-1"
      />
    </app-form-field>

    <app-form-field label="Product" fieldId="trial-product" spacing="">
      <p-select
        inputId="trial-product"
        [options]="products()"
        [(ngModel)]="productId"
        name="productId"
        optionLabel="name"
        optionValue="id"
        placeholder="Select product"
        [showClear]="true"
        [style]="{ width: '100%' }"
        class="mt-1"
      />
    </app-form-field>

    <app-form-field label="Therapeutic Area" fieldId="trial-ta" spacing="">
      <p-select
        inputId="trial-ta"
        [options]="therapeuticAreas()"
        [(ngModel)]="therapeuticAreaId"
        name="therapeuticAreaId"
        optionLabel="name"
        optionValue="id"
        placeholder="Select therapeutic area"
        [showClear]="true"
        [style]="{ width: '100%' }"
        class="mt-1"
      />
    </app-form-field>

    <app-form-field label="Sample Size" fieldId="trial-sample-size" spacing="">
      <p-inputnumber
        inputId="trial-sample-size"
        [(ngModel)]="sampleSize"
        name="sampleSize"
        [min]="0"
        [style]="{ width: '100%' }"
        class="mt-1"
      />
    </app-form-field>

    <app-form-field label="Display Order" fieldId="trial-display-order" spacing="">
      <p-inputnumber
        inputId="trial-display-order"
        [(ngModel)]="displayOrder"
        name="displayOrder"
        [min]="0"
        [style]="{ width: '100%' }"
        class="mt-1"
      />
    </app-form-field>

    <app-form-field label="Notes" fieldId="trial-notes" spacing="sm:col-span-2">
      <textarea
        pTextarea
        id="trial-notes"
        [(ngModel)]="notes"
        name="notes"
        rows="2"
        class="w-full mt-1"
        placeholder="Additional notes"
      ></textarea>
    </app-form-field>
  </div>

  <!-- Study Design -->
  <p-fieldset legend="Study Design" [toggleable]="true" [collapsed]="true">
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
      <app-form-field label="Study Type" fieldId="trial-study-type" spacing="">
        <p-select
          inputId="trial-study-type"
          [options]="studyTypeOptions"
          [(ngModel)]="studyType"
          name="studyType"
          optionLabel="label"
          optionValue="value"
          placeholder="Select"
          [showClear]="true"
          [style]="{ width: '100%' }"
          class="mt-1"
        />
      </app-form-field>
      <app-form-field label="Phase" fieldId="trial-phase" spacing="">
        <p-select
          inputId="trial-phase"
          [options]="phaseOptions"
          [(ngModel)]="phase"
          name="phase"
          optionLabel="label"
          optionValue="value"
          placeholder="Select"
          [showClear]="true"
          [style]="{ width: '100%' }"
          class="mt-1"
        />
      </app-form-field>
      <app-form-field label="Masking" fieldId="trial-masking" spacing="">
        <p-select
          inputId="trial-masking"
          [options]="maskingOptions"
          [(ngModel)]="designMasking"
          name="designMasking"
          optionLabel="label"
          optionValue="value"
          placeholder="Select"
          [showClear]="true"
          [style]="{ width: '100%' }"
          class="mt-1"
        />
      </app-form-field>
      <app-form-field label="Primary Purpose" fieldId="trial-purpose" spacing="">
        <p-select
          inputId="trial-purpose"
          [options]="purposeOptions"
          [(ngModel)]="designPrimaryPurpose"
          name="designPrimaryPurpose"
          optionLabel="label"
          optionValue="value"
          placeholder="Select"
          [showClear]="true"
          [style]="{ width: '100%' }"
          class="mt-1"
        />
      </app-form-field>
      <app-form-field label="Intervention Type" fieldId="trial-intervention-type" spacing="">
        <input
          pInputText
          id="trial-intervention-type"
          class="w-full mt-1"
          [(ngModel)]="interventionType"
          name="interventionType"
          placeholder="e.g. Drug, Biologic, Device"
        />
      </app-form-field>
      <app-form-field label="Intervention Name" fieldId="trial-intervention-name" spacing="">
        <input
          pInputText
          id="trial-intervention-name"
          class="w-full mt-1"
          [(ngModel)]="interventionName"
          name="interventionName"
          placeholder="Drug/device name"
        />
      </app-form-field>
    </div>
  </p-fieldset>

  <!-- Eligibility -->
  <p-fieldset legend="Eligibility" [toggleable]="true" [collapsed]="true">
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
      <app-form-field label="Sex" fieldId="trial-sex" spacing="">
        <p-select
          inputId="trial-sex"
          [options]="sexOptions"
          [(ngModel)]="eligibilitySex"
          name="eligibilitySex"
          optionLabel="label"
          optionValue="value"
          placeholder="Select"
          [showClear]="true"
          [style]="{ width: '100%' }"
          class="mt-1"
        />
      </app-form-field>
      <app-form-field label="Min Age" fieldId="trial-min-age" spacing="">
        <input
          pInputText
          id="trial-min-age"
          class="w-full mt-1"
          [(ngModel)]="eligibilityMinAge"
          name="eligibilityMinAge"
          placeholder="e.g. 18 Years"
        />
      </app-form-field>
      <app-form-field label="Max Age" fieldId="trial-max-age" spacing="">
        <input
          pInputText
          id="trial-max-age"
          class="w-full mt-1"
          [(ngModel)]="eligibilityMaxAge"
          name="eligibilityMaxAge"
          placeholder="e.g. 65 Years"
        />
      </app-form-field>
      <div class="flex items-center pt-6">
        <p-checkbox
          [(ngModel)]="acceptsHealthyVolunteers"
          name="acceptsHealthyVolunteers"
          [binary]="true"
          inputId="trial-healthy"
        />
        <label for="trial-healthy" class="ml-2 text-sm text-slate-700"
          >Accepts Healthy Volunteers</label
        >
      </div>
    </div>
  </p-fieldset>

  <!-- Timeline -->
  <p-fieldset legend="Timeline" [toggleable]="true" [collapsed]="true">
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
      <app-form-field label="Start Date" fieldId="trial-start-date" spacing="">
        <input
          type="date"
          id="trial-start-date"
          class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500"
          [(ngModel)]="startDateStr"
          name="startDateStr"
        />
      </app-form-field>
      <app-form-field label="Primary Completion Date" fieldId="trial-pcd" spacing="">
        <input
          type="date"
          id="trial-pcd"
          class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500"
          [(ngModel)]="primaryCompletionDateStr"
          name="primaryCompletionDateStr"
        />
      </app-form-field>
      <app-form-field label="Lead Sponsor" fieldId="trial-lead-sponsor" spacing="">
        <input
          pInputText
          id="trial-lead-sponsor"
          class="w-full mt-1"
          [(ngModel)]="leadSponsor"
          name="leadSponsor"
        />
      </app-form-field>
      <app-form-field label="Recruitment Status" fieldId="trial-recruitment" spacing="">
        <input
          pInputText
          id="trial-recruitment"
          class="w-full mt-1"
          [(ngModel)]="recruitmentStatus"
          name="recruitmentStatus"
          placeholder="e.g. Recruiting, Completed"
        />
      </app-form-field>
    </div>
  </p-fieldset>

  <!-- Regulatory -->
  <p-fieldset legend="Regulatory" [toggleable]="true" [collapsed]="true">
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
      <app-form-field
        label="FDA Designations"
        fieldId="trial-fda-designations"
        spacing="sm:col-span-2"
      >
        <p-multiselect
          inputId="trial-fda-designations"
          [options]="fdaDesignationOptions"
          [(ngModel)]="fdaDesignations"
          name="fdaDesignations"
          optionLabel="label"
          optionValue="value"
          placeholder="Select designations"
          [showClear]="true"
          [style]="{ width: '100%' }"
          class="mt-1"
        />
      </app-form-field>
      <div class="flex items-center gap-4">
        <div class="flex items-center">
          <p-checkbox [(ngModel)]="hasDmc" name="hasDmc" [binary]="true" inputId="trial-dmc" />
          <label for="trial-dmc" class="ml-2 text-sm text-slate-700">Has DMC</label>
        </div>
        <div class="flex items-center">
          <p-checkbox
            [(ngModel)]="isFdaRegulatedDrug"
            name="isFdaRegulatedDrug"
            [binary]="true"
            inputId="trial-fda-drug"
          />
          <label for="trial-fda-drug" class="ml-2 text-sm text-slate-700">FDA Regulated Drug</label>
        </div>
        <div class="flex items-center">
          <p-checkbox
            [(ngModel)]="isFdaRegulatedDevice"
            name="isFdaRegulatedDevice"
            [binary]="true"
            inputId="trial-fda-device"
          />
          <label for="trial-fda-device" class="ml-2 text-sm text-slate-700"
            >FDA Regulated Device</label
          >
        </div>
      </div>
    </div>
  </p-fieldset>

  <app-form-actions submitLabel="Save" [loading]="saving()" (cancelled)="cancelled.emit()" />
</form>
