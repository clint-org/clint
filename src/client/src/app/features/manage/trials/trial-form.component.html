<form (ngSubmit)="onSubmit()" class="space-y-4">
  @if (error()) {
    <p-message severity="error" [closable]="false">{{ error() }}</p-message>
  }

  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
    <div class="sm:col-span-2">
      <label for="trial-name" class="block text-sm font-medium text-slate-700">Name <span class="text-red-500">*</span></label>
      <input pInputText id="trial-name" class="w-full mt-1" [(ngModel)]="name" name="name" required placeholder="Trial name" />
    </div>

    <div>
      <label for="trial-identifier" class="block text-sm font-medium text-slate-700">Identifier</label>
      <input pInputText id="trial-identifier" class="w-full mt-1" [(ngModel)]="identifier" name="identifier" placeholder="e.g. NCT12345678" />
    </div>

    <div>
      <label for="trial-status" class="block text-sm font-medium text-slate-700">Status</label>
      <p-select inputId="trial-status" [options]="statusOptions" [(ngModel)]="status" name="status" optionLabel="label" optionValue="value" placeholder="Select status" [showClear]="true" [style]="{ width: '100%' }" class="mt-1" />
    </div>

    <div>
      <label for="trial-product" class="block text-sm font-medium text-slate-700">Product</label>
      <p-select inputId="trial-product" [options]="products()" [(ngModel)]="productId" name="productId" optionLabel="name" optionValue="id" placeholder="Select product" [showClear]="true" [style]="{ width: '100%' }" class="mt-1" />
    </div>

    <div>
      <label for="trial-ta" class="block text-sm font-medium text-slate-700">Therapeutic Area</label>
      <p-select inputId="trial-ta" [options]="therapeuticAreas()" [(ngModel)]="therapeuticAreaId" name="therapeuticAreaId" optionLabel="name" optionValue="id" placeholder="Select therapeutic area" [showClear]="true" [style]="{ width: '100%' }" class="mt-1" />
    </div>

    <div>
      <label for="trial-sample-size" class="block text-sm font-medium text-slate-700">Sample Size</label>
      <p-inputnumber inputId="trial-sample-size" [(ngModel)]="sampleSize" name="sampleSize" [min]="0" [style]="{ width: '100%' }" class="mt-1" />
    </div>

    <div>
      <label for="trial-display-order" class="block text-sm font-medium text-slate-700">Display Order</label>
      <p-inputnumber inputId="trial-display-order" [(ngModel)]="displayOrder" name="displayOrder" [min]="0" [style]="{ width: '100%' }" class="mt-1" />
    </div>

    <div class="sm:col-span-2">
      <label for="trial-notes" class="block text-sm font-medium text-slate-700">Notes</label>
      <textarea pTextarea id="trial-notes" [(ngModel)]="notes" name="notes" rows="3" class="w-full mt-1" placeholder="Additional notes"></textarea>
    </div>
  </div>

  <div class="flex justify-end gap-2">
    <p-button label="Cancel" severity="secondary" [outlined]="true" (onClick)="cancelled.emit()" />
    <p-button label="Save" type="submit" [loading]="saving()" />
  </div>
</form>
