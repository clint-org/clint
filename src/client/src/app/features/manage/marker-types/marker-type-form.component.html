<form (ngSubmit)="onSubmit()" class="space-y-4">
  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
    <div class="sm:col-span-2">
      <label for="mt-name" class="block text-sm font-medium text-slate-700">
        Name <span class="text-red-500">*</span>
      </label>
      <input
        id="mt-name"
        type="text"
        [(ngModel)]="name"
        name="name"
        required
        aria-required="true"
        class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm
               focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500"
        placeholder="Marker type name"
      />
    </div>

    <div>
      <label for="mt-shape" class="block text-sm font-medium text-slate-700">
        Shape
      </label>
      <select
        id="mt-shape"
        [(ngModel)]="shape"
        name="shape"
        required
        aria-required="true"
        class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm
               focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500"
      >
        @for (s of shapes; track s) {
          <option [value]="s">{{ s }}</option>
        }
      </select>
    </div>

    <div>
      <label for="mt-fill-style" class="block text-sm font-medium text-slate-700">
        Fill Style
      </label>
      <select
        id="mt-fill-style"
        [(ngModel)]="fillStyle"
        name="fillStyle"
        required
        aria-required="true"
        class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm
               focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500"
      >
        @for (fs of fillStyles; track fs) {
          <option [value]="fs">{{ fs }}</option>
        }
      </select>
    </div>

    <div>
      <label for="mt-color" class="block text-sm font-medium text-slate-700">
        Color
      </label>
      <input
        id="mt-color"
        type="color"
        [(ngModel)]="color"
        name="color"
        class="mt-1 block h-10 w-20 cursor-pointer rounded-md border border-slate-300"
        aria-label="Marker type color"
      />
    </div>

    <div>
      <label for="mt-icon" class="block text-sm font-medium text-slate-700">
        Icon
      </label>
      <input
        id="mt-icon"
        type="text"
        [(ngModel)]="icon"
        name="icon"
        class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm
               focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500"
        placeholder="Optional icon identifier"
        aria-label="Marker type icon"
      />
    </div>

    <div>
      <label for="mt-display-order" class="block text-sm font-medium text-slate-700">
        Display Order
      </label>
      <input
        id="mt-display-order"
        type="number"
        [(ngModel)]="displayOrder"
        name="displayOrder"
        min="0"
        class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm
               focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500"
        aria-label="Marker type display order"
      />
    </div>
  </div>

  <!-- Preview -->
  <div class="rounded-md border border-slate-200 bg-slate-50 p-4">
    <p class="mb-2 text-sm font-medium text-slate-700">Preview</p>
    <div class="flex items-center gap-3">
      <svg
        width="32"
        height="32"
        viewBox="0 0 32 32"
        [attr.aria-label]="'Preview: ' + shape + ' ' + fillStyle"
        role="img"
      >
        @switch (shape) {
          @case ('circle') {
            <circle
              cx="16" cy="16" r="12"
              [attr.fill]="fillStyle === 'filled' || fillStyle === 'gradient' ? color : 'none'"
              [attr.stroke]="color"
              stroke-width="2"
              [attr.stroke-dasharray]="fillStyle === 'striped' ? '4 2' : 'none'"
            />
          }
          @case ('diamond') {
            <polygon
              points="16,2 30,16 16,30 2,16"
              [attr.fill]="fillStyle === 'filled' || fillStyle === 'gradient' ? color : 'none'"
              [attr.stroke]="color"
              stroke-width="2"
              [attr.stroke-dasharray]="fillStyle === 'striped' ? '4 2' : 'none'"
            />
          }
          @case ('flag') {
            <line [attr.stroke]="color" stroke-width="2" x1="8" y1="4" x2="8" y2="28" />
            <polygon
              points="8,4 26,10 8,16"
              [attr.fill]="fillStyle === 'filled' || fillStyle === 'gradient' ? color : 'none'"
              [attr.stroke]="color"
              stroke-width="2"
              [attr.stroke-dasharray]="fillStyle === 'striped' ? '4 2' : 'none'"
            />
          }
          @case ('arrow') {
            <polygon
              points="16,2 28,28 16,20 4,28"
              [attr.fill]="fillStyle === 'filled' || fillStyle === 'gradient' ? color : 'none'"
              [attr.stroke]="color"
              stroke-width="2"
              [attr.stroke-dasharray]="fillStyle === 'striped' ? '4 2' : 'none'"
            />
          }
          @case ('x') {
            <line [attr.stroke]="color" stroke-width="3" x1="6" y1="6" x2="26" y2="26" />
            <line [attr.stroke]="color" stroke-width="3" x1="26" y1="6" x2="6" y2="26" />
          }
          @case ('bar') {
            <rect
              x="4" y="8" width="24" height="16" rx="2"
              [attr.fill]="fillStyle === 'filled' || fillStyle === 'gradient' ? color : 'none'"
              [attr.stroke]="color"
              stroke-width="2"
              [attr.stroke-dasharray]="fillStyle === 'striped' ? '4 2' : 'none'"
            />
          }
        }
      </svg>
      <span class="text-sm text-slate-600">{{ name || 'Untitled' }} -- {{ shape }}, {{ fillStyle }}</span>
    </div>
  </div>

  <div class="flex justify-end gap-2">
    <button
      type="button"
      (click)="cancelled.emit()"
      class="rounded-md border border-slate-300 bg-white px-4 py-2 text-sm font-medium
             text-slate-700 hover:bg-slate-50 focus:outline-none focus:ring-2
             focus:ring-teal-500 focus:ring-offset-2"
      aria-label="Cancel marker type form"
    >
      Cancel
    </button>
    <button
      type="submit"
      [disabled]="saving()"
      class="rounded-md bg-teal-600 px-4 py-2 text-sm font-medium text-white
             hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-teal-500
             focus:ring-offset-2 disabled:opacity-50"
      aria-label="Save marker type"
    >
      {{ saving() ? 'Saving...' : 'Save' }}
    </button>
  </div>

  @if (error()) {
    <p class="text-sm text-red-600" role="alert">{{ error() }}</p>
  }
</form>
