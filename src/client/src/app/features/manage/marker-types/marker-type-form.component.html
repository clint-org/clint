<form (ngSubmit)="onSubmit()" class="space-y-4">
  @if (error()) {
    <p-message severity="error" [closable]="false">{{ error() }}</p-message>
  }

  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
    <div class="sm:col-span-2">
      <label for="mt-name" class="block text-sm font-medium text-slate-700">Name <span class="text-red-500">*</span></label>
      <input pInputText id="mt-name" class="w-full mt-1" [(ngModel)]="name" name="name" required placeholder="Marker type name" />
    </div>

    <div>
      <label for="mt-shape" class="block text-sm font-medium text-slate-700">Shape</label>
      <p-select
        inputId="mt-shape"
        [options]="shapeOptions"
        [(ngModel)]="shape"
        name="shape"
        optionLabel="label"
        optionValue="value"
        [style]="{ width: '100%' }"
        class="mt-1"
      />
    </div>

    <div>
      <label for="mt-fill-style" class="block text-sm font-medium text-slate-700">Fill Style</label>
      <p-select
        inputId="mt-fill-style"
        [options]="fillStyleOptions"
        [(ngModel)]="fillStyle"
        name="fillStyle"
        optionLabel="label"
        optionValue="value"
        [style]="{ width: '100%' }"
        class="mt-1"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Color</label>
      <p-colorpicker [(ngModel)]="color" name="color" />
    </div>

    <div>
      <label for="mt-icon" class="block text-sm font-medium text-slate-700">Icon</label>
      <input pInputText id="mt-icon" class="w-full mt-1" [(ngModel)]="icon" name="icon" placeholder="Optional icon identifier" />
    </div>

    <div>
      <label for="mt-display-order" class="block text-sm font-medium text-slate-700">Display Order</label>
      <p-inputnumber inputId="mt-display-order" [(ngModel)]="displayOrder" name="displayOrder" [min]="0" [style]="{ width: '100%' }" class="mt-1" />
    </div>
  </div>

  <!-- Preview (custom SVG -- kept as-is) -->
  <div class="rounded-md border border-slate-200 bg-slate-50 p-4">
    <p class="mb-2 text-sm font-medium text-slate-700">Preview</p>
    <div class="flex items-center gap-3">
      <svg width="32" height="32" viewBox="0 0 32 32" [attr.aria-label]="'Preview: ' + shape + ' ' + fillStyle" role="img">
        @switch (shape) {
          @case ('circle') {
            <circle cx="16" cy="16" r="12"
              [attr.fill]="fillStyle === 'filled' || fillStyle === 'gradient' ? color : 'none'"
              [attr.stroke]="color" stroke-width="2"
              [attr.stroke-dasharray]="fillStyle === 'striped' ? '4 2' : 'none'" />
          }
          @case ('diamond') {
            <polygon points="16,2 30,16 16,30 2,16"
              [attr.fill]="fillStyle === 'filled' || fillStyle === 'gradient' ? color : 'none'"
              [attr.stroke]="color" stroke-width="2"
              [attr.stroke-dasharray]="fillStyle === 'striped' ? '4 2' : 'none'" />
          }
          @case ('flag') {
            <line [attr.stroke]="color" stroke-width="2" x1="8" y1="4" x2="8" y2="28" />
            <polygon points="8,4 26,10 8,16"
              [attr.fill]="fillStyle === 'filled' || fillStyle === 'gradient' ? color : 'none'"
              [attr.stroke]="color" stroke-width="2"
              [attr.stroke-dasharray]="fillStyle === 'striped' ? '4 2' : 'none'" />
          }
          @case ('arrow') {
            <polygon points="16,2 28,28 16,20 4,28"
              [attr.fill]="fillStyle === 'filled' || fillStyle === 'gradient' ? color : 'none'"
              [attr.stroke]="color" stroke-width="2"
              [attr.stroke-dasharray]="fillStyle === 'striped' ? '4 2' : 'none'" />
          }
          @case ('x') {
            <line [attr.stroke]="color" stroke-width="3" x1="6" y1="6" x2="26" y2="26" />
            <line [attr.stroke]="color" stroke-width="3" x1="26" y1="6" x2="6" y2="26" />
          }
          @case ('bar') {
            <rect x="4" y="8" width="24" height="16" rx="2"
              [attr.fill]="fillStyle === 'filled' || fillStyle === 'gradient' ? color : 'none'"
              [attr.stroke]="color" stroke-width="2"
              [attr.stroke-dasharray]="fillStyle === 'striped' ? '4 2' : 'none'" />
          }
        }
      </svg>
      <span class="text-sm text-slate-600">{{ name || 'Untitled' }} -- {{ shape }}, {{ fillStyle }}</span>
    </div>
  </div>

  <div class="flex justify-end gap-2">
    <p-button label="Cancel" severity="secondary" [outlined]="true" (onClick)="cancelled.emit()" />
    <p-button label="Save" type="submit" [loading]="saving()" />
  </div>
</form>
