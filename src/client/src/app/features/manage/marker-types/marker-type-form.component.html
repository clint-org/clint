<form (ngSubmit)="onSubmit()" class="space-y-4">
  @if (error()) {
    <p-message severity="error" [closable]="false">{{ error() }}</p-message>
  }

  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
    <app-form-field
      label="Name"
      fieldId="mt-name"
      [required]="true"
      [error]="nameInvalid ? 'Name is required.' : null"
      spacing="sm:col-span-2"
    >
      <input
        pInputText
        id="mt-name"
        class="w-full mt-1"
        [(ngModel)]="name"
        name="name"
        required
        placeholder="e.g. FDA Approval, Data Readout"
        (blur)="nameBlurred.set(true)"
        [attr.aria-invalid]="nameInvalid"
      />
    </app-form-field>

    <app-form-field label="Shape" fieldId="mt-shape" spacing="">
      <p-select
        inputId="mt-shape"
        [options]="shapeOptions"
        [(ngModel)]="shape"
        name="shape"
        optionLabel="label"
        optionValue="value"
        [style]="{ width: '100%' }"
        class="mt-1"
      />
    </app-form-field>

    <app-form-field label="Fill Style" fieldId="mt-fill-style" spacing="">
      <p-select
        inputId="mt-fill-style"
        [options]="fillStyleOptions"
        [(ngModel)]="fillStyle"
        name="fillStyle"
        optionLabel="label"
        optionValue="value"
        [style]="{ width: '100%' }"
        class="mt-1"
      />
    </app-form-field>

    <app-form-field label="Color" fieldId="mt-color" spacing="">
      <p-colorpicker [(ngModel)]="color" name="color" inputId="mt-color" />
    </app-form-field>

    <app-form-field label="Icon" fieldId="mt-icon" spacing="">
      <input
        pInputText
        id="mt-icon"
        class="w-full mt-1"
        [(ngModel)]="icon"
        name="icon"
        placeholder="e.g. fa-solid fa-check"
      />
    </app-form-field>

    <app-form-field label="Display Order" fieldId="mt-display-order" spacing="">
      <p-inputnumber
        inputId="mt-display-order"
        [(ngModel)]="displayOrder"
        name="displayOrder"
        [min]="0"
        [style]="{ width: '100%' }"
        class="mt-1"
      />
    </app-form-field>
  </div>

  <!-- Preview (custom SVG -- kept as-is) -->
  <div class="rounded-md border border-slate-200 bg-slate-50 p-4">
    <p class="mb-2 text-sm font-medium text-slate-700">Preview</p>
    <div class="flex items-center gap-3">
      <svg
        width="32"
        height="32"
        viewBox="0 0 32 32"
        [attr.aria-label]="'Preview: ' + shape + ' ' + fillStyle"
        role="img"
      >
        @switch (shape) {
          @case ('circle') {
            <circle
              cx="16"
              cy="16"
              r="12"
              [attr.fill]="fillStyle === 'filled' ? color : 'none'"
              [attr.stroke]="color"
              stroke-width="2"
            />
          }
          @case ('diamond') {
            <polygon
              points="16,2 30,16 16,30 2,16"
              [attr.fill]="fillStyle === 'filled' ? color : 'none'"
              [attr.stroke]="color"
              stroke-width="2"
            />
          }
          @case ('flag') {
            <line [attr.stroke]="color" stroke-width="2" x1="8" y1="4" x2="8" y2="28" />
            <polygon
              points="8,4 26,10 8,16"
              [attr.fill]="fillStyle === 'filled' ? color : 'none'"
              [attr.stroke]="color"
              stroke-width="2"
            />
          }
          @case ('triangle') {
            <polygon
              points="6,4 28,16 6,28"
              [attr.fill]="fillStyle === 'filled' ? color : 'none'"
              [attr.stroke]="color"
              stroke-width="2"
            />
          }
          @case ('square') {
            <rect
              x="4"
              y="4"
              width="24"
              height="24"
              [attr.fill]="fillStyle === 'filled' ? color : 'none'"
              [attr.stroke]="color"
              stroke-width="2"
            />
          }
          @case ('dashed-line') {
            <line
              x1="16" y1="4" x2="16" y2="28"
              [attr.stroke]="color"
              stroke-width="2"
              stroke-dasharray="4,3"
              stroke-linecap="round"
            />
          }
        }
      </svg>
      <span class="text-sm text-slate-600"
        >{{ name || 'Untitled' }} -- {{ shape }}, {{ fillStyle }}</span
      >
    </div>
  </div>

  <app-form-actions
    [submitLabel]="markerType() ? 'Update Marker Type' : 'Create Marker Type'"
    [loading]="saving()"
    (cancelled)="cancelled.emit()"
  />
</form>
