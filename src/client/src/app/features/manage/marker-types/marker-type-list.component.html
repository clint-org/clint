<app-manage-page-shell
  eyebrow="Manage"
  title="Marker types"
  [count]="grid.totalRecords()"
  subtitle="Event symbols rendered on the timeline. System types are read-only."
>
  <div actions>
    <p-button
      label="Add marker type"
      icon="fa-solid fa-plus"
      severity="secondary"
      [outlined]="true"
      size="small"
      (onClick)="openCreateModal()"
    />
  </div>

  <app-grid-toolbar [state]="grid" searchPlaceholder="Search marker types..." />

  <p-table
    styleClass="data-table"
    [value]="visibleTypes()"
    [loading]="loading()"
    [tableStyle]="{ 'min-width': '48rem' }"
    [lazy]="true"
    (onLazyLoad)="grid.onLazyLoad($any($event))"
    [paginator]="true"
    [rows]="grid.page().rows"
    [first]="grid.page().first"
    [totalRecords]="grid.totalRecords()"
    [rowsPerPageOptions]="[10, 25, 50, 100]"
    [filters]="grid.primengFilters()"
  >
    <ng-template #header>
      <tr>
        <th pSortableColumn="name">
          Name <p-sortIcon field="name" />
          <p-columnFilter type="text" field="name" display="menu" />
        </th>
        <th pSortableColumn="shape">
          Shape <p-sortIcon field="shape" />
          <p-columnFilter type="text" field="shape" display="menu" />
        </th>
        <th pSortableColumn="fill_style">
          Fill <p-sortIcon field="fill_style" />
          <p-columnFilter type="text" field="fill_style" display="menu" />
        </th>
        <th>Color</th>
        <th pSortableColumn="is_system">
          Origin <p-sortIcon field="is_system" />
          <p-columnFilter type="text" field="is_system" display="menu" />
        </th>
        <th class="col-actions"></th>
      </tr>
    </ng-template>
    <ng-template #body let-mt>
      <tr>
        <td>{{ mt.name }}</td>
        <td class="col-secondary">{{ mt.shape }}</td>
        <td class="col-secondary">{{ mt.fill_style }}</td>
        <td>
          <app-color-swatch [color]="mt.color" />
        </td>
        <td>
          @if (mt.is_system) {
            <app-status-tag label="System" tone="slate" />
          } @else {
            <app-status-tag label="Custom" tone="teal" />
          }
        </td>
        <td class="col-actions">
          @if (!mt.is_system) {
            <app-row-actions [items]="rowMenu(mt)" [ariaLabel]="'Actions for ' + mt.name" />
          }
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="6">
          @if (grid.isFiltered()) {
            No marker types match your filters.
          } @else {
            No marker types yet. Add one to get started.
          }
        </td>
      </tr>
    </ng-template>
  </p-table>

  @if (error()) {
    <p-message severity="error" [closable]="false" styleClass="mt-4">{{ error() }}</p-message>
  }
</app-manage-page-shell>

<p-dialog
  [header]="editingType() ? 'Edit marker type' : 'Add marker type'"
  [(visible)]="modalOpen"
  [modal]="true"
  [style]="{ width: '32rem' }"
  (onHide)="closeModal()"
>
  <app-marker-type-form
    [markerType]="editingType()"
    (saved)="onTypeSaved()"
    (cancelled)="closeModal()"
  />
</p-dialog>
