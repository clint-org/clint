<app-manage-page-shell
  eyebrow="Manage"
  title="Marker types"
  [count]="markerTypes().length"
  subtitle="Event symbols rendered on the timeline. System types are read-only."
>
  <div actions>
    <p-button
      label="Add marker type"
      icon="fa-solid fa-plus"
      severity="secondary"
      [outlined]="true"
      size="small"
      (onClick)="openCreateModal()"
    />
  </div>

  @if (error()) {
    <p-message severity="error" [closable]="false" styleClass="mb-4">{{ error() }}</p-message>
  }

  <p-table
    styleClass="manage-table"
    [value]="markerTypes()"
    [loading]="loading()"
    [tableStyle]="{ 'min-width': '48rem' }"
  >
    <ng-template #header>
      <tr>
        <th>Name</th>
        <th>Shape</th>
        <th>Fill</th>
        <th>Color</th>
        <th>Origin</th>
        <th class="col-actions"></th>
      </tr>
    </ng-template>
    <ng-template #body let-mt>
      <tr>
        <td>{{ mt.name }}</td>
        <td class="col-secondary">{{ mt.shape }}</td>
        <td class="col-secondary">{{ mt.fill_style }}</td>
        <td>
          <app-color-swatch [color]="mt.color" />
        </td>
        <td>
          @if (mt.is_system) {
            <app-status-tag label="System" tone="slate" />
          } @else {
            <app-status-tag label="Custom" tone="teal" />
          }
        </td>
        <td class="col-actions">
          @if (!mt.is_system) {
            <app-row-actions [items]="rowMenu(mt)" [ariaLabel]="'Actions for ' + mt.name" />
          }
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="6">No marker types yet. Add one to get started.</td>
      </tr>
    </ng-template>
  </p-table>
</app-manage-page-shell>

<p-dialog
  [header]="editingType() ? 'Edit marker type' : 'Add marker type'"
  [(visible)]="modalOpen"
  [modal]="true"
  [style]="{ width: '32rem' }"
  (onHide)="closeModal()"
>
  <app-marker-type-form
    [markerType]="editingType()"
    (saved)="onTypeSaved()"
    (cancelled)="closeModal()"
  />
</p-dialog>
