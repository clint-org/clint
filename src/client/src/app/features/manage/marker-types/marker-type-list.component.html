<div class="mx-auto max-w-4xl p-6">
  <div class="mb-6 flex items-center justify-between">
    <h1 class="text-2xl font-bold text-slate-900">Marker Types</h1>
    <p-button label="Add Marker Type" icon="fa-solid fa-plus" size="small" (onClick)="openCreateModal()" />
  </div>

  @if (error()) {
    <p-message severity="error" [closable]="false" class="mb-4">{{ error() }}</p-message>
  }

  <p-table [value]="markerTypes()" [loading]="loading()" [tableStyle]="{ 'min-width': '40rem' }">
    <ng-template #header>
      <tr>
        <th>Name</th>
        <th>Shape</th>
        <th>Fill Style</th>
        <th>Color</th>
        <th>System?</th>
        <th class="text-right">Actions</th>
      </tr>
    </ng-template>
    <ng-template #body let-mt>
      <tr [class.opacity-60]="mt.is_system">
        <td>{{ mt.name }}</td>
        <td>{{ mt.shape }}</td>
        <td>{{ mt.fill_style }}</td>
        <td>
          <span class="inline-block h-5 w-5 rounded-full border border-slate-300" [style.background-color]="mt.color"></span>
        </td>
        <td>{{ mt.is_system ? 'Yes' : 'No' }}</td>
        <td class="text-right">
          @if (!mt.is_system) {
            <p-button label="Edit" [text]="true" size="small" (onClick)="openEditModal(mt)" class="mr-1" />
            <p-button label="Delete" [text]="true" severity="danger" size="small" (onClick)="deleteType(mt.id)" />
          } @else {
            <span class="text-xs text-slate-400">Read-only</span>
          }
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="6" class="text-center text-sm text-slate-500 py-8">No marker types found.</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog
  [header]="editingType() ? 'Edit Marker Type' : 'New Marker Type'"
  [(visible)]="modalOpen"
  [modal]="true"
  [style]="{ width: '36rem' }"
  (onHide)="closeModal()"
>
  <app-marker-type-form
    [markerType]="editingType()"
    (saved)="onTypeSaved()"
    (cancelled)="closeModal()"
  />
</p-dialog>
