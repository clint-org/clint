<app-manage-page-shell>
  <p-table
    styleClass="data-table"
    [value]="items()"
    [loading]="loading()"
    [tableStyle]="{ 'min-width': '36rem' }"
  >
    <ng-template #header>
      <tr>
        <th>Name</th>
        <th>Abbreviation</th>
        <th class="col-actions"></th>
      </tr>
    </ng-template>
    <ng-template #body let-item>
      <tr>
        <td>{{ item.name }}</td>
        <td class="col-identifier">{{ item.abbreviation ?? '--' }}</td>
        <td class="col-actions">
          <app-row-actions [items]="rowMenu(item)" [ariaLabel]="'Actions for ' + item.name" />
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="3">No routes of administration yet. Add one to get started.</td>
      </tr>
    </ng-template>
  </p-table>

  @if (deleteError()) {
    <p-message severity="error" [closable]="false" styleClass="mt-4">
      {{ deleteError() }}
    </p-message>
  }
</app-manage-page-shell>

<p-dialog
  [header]="editingItem() ? 'Edit route of administration' : 'Add route of administration'"
  [(visible)]="modalOpen"
  [modal]="true"
  [style]="{ width: '32rem' }"
  (onHide)="closeModal()"
>
  @if (modalOpen()) {
    <app-route-of-administration-form
      [item]="editingItem()"
      (saved)="onSaved()"
      (cancelled)="closeModal()"
    />
  }
</p-dialog>
