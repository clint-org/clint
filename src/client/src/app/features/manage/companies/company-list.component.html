<app-manage-page-shell>
  <app-grid-toolbar [state]="grid" searchPlaceholder="Search companies..." />

  <p-table
    styleClass="data-table"
    [value]="visibleCompanies()"
    [loading]="loading()"
    [tableStyle]="{ 'min-width': '48rem' }"
    [lazy]="true"
    (onLazyLoad)="grid.onLazyLoad($any($event))"
    [paginator]="true"
    [rows]="grid.page().rows"
    [first]="grid.page().first"
    [totalRecords]="grid.totalRecords()"
    [rowsPerPageOptions]="[10, 25, 50, 100]"
    [filters]="grid.primengFilters()"
  >
    <ng-template #header>
      <tr>
        <th pSortableColumn="name">
          Name <p-sortIcon field="name" />
          <p-columnFilter type="text" field="name" display="menu" />
        </th>
        <th class="col-logo">Logo</th>
        <th class="col-num" pSortableColumn="display_order">
          Order <p-sortIcon field="display_order" />
        </th>
        <th class="col-actions"></th>
      </tr>
    </ng-template>
    <ng-template #body let-company>
      <tr>
        <td>
          <button
            type="button"
            class="text-left text-brand-700 hover:text-brand-800 hover:underline focus:outline-none focus:ring-1 focus:ring-brand-500"
            (click)="openProducts(company.id)"
          >
            {{ company.name }}
          </button>
        </td>
        <td>
          @if (company.logo_url && !brokenLogos().has(company.id)) {
            <img
              [src]="company.logo_url"
              [alt]="company.name + ' logo'"
              class="h-5 w-auto max-w-[8rem] object-contain"
              loading="lazy"
              (error)="onLogoError(company.id)"
            />
          } @else {
            <span class="text-slate-300">--</span>
          }
        </td>
        <td class="col-num">{{ company.display_order }}</td>
        <td class="col-actions">
          <app-row-actions [items]="rowMenu(company)" [ariaLabel]="'Actions for ' + company.name" />
        </td>
      </tr>
    </ng-template>
    <ng-template #loadingbody>
      <app-table-skeleton-body
        [cells]="[
          { w: '62%' },
          { w: '80px', h: '14px' },
          { w: '22px', class: 'col-num' },
          { w: '14px', class: 'col-actions' },
        ]"
      />
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="4">
          @if (grid.isFiltered()) {
            No companies match your filters.
          } @else {
            No companies yet. Add one to get started.
          }
        </td>
      </tr>
    </ng-template>
  </p-table>

  @if (deleteError()) {
    <p-message severity="error" [closable]="false" styleClass="mt-4">
      {{ deleteError() }}
    </p-message>
  }
</app-manage-page-shell>

<p-dialog
  [header]="editingCompany() ? 'Edit company' : 'Add company'"
  [(visible)]="modalOpen"
  [modal]="true"
  [style]="{ width: '32rem' }"
  (onHide)="closeModal()"
>
  @if (modalOpen()) {
    <app-company-form [company]="editingCompany()" (saved)="onSaved()" (cancelled)="closeModal()" />
  }
</p-dialog>
