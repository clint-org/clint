<div class="p-4">
  <div class="mb-4 flex items-center justify-between">
    <h1 class="text-xl font-semibold text-slate-900">Companies</h1>
    <p-button label="Add Company" icon="fa-solid fa-plus" size="small" (onClick)="openCreateModal()" />
  </div>

  <p-table [value]="companies()" [loading]="loading()" [tableStyle]="{ 'min-width': '40rem' }">
    <ng-template #header>
      <tr>
        <th>Name</th>
        <th>Logo URL</th>
        <th>Order</th>
        <th class="text-right">Actions</th>
      </tr>
    </ng-template>
    <ng-template #body let-company>
      <tr>
        <td class="font-medium">{{ company.name }}</td>
        <td class="max-w-[200px] truncate text-slate-500">{{ company.logo_url ?? '-' }}</td>
        <td class="text-slate-500">{{ company.display_order }}</td>
        <td class="text-right">
          <p-button label="Edit" [text]="true" size="small" (onClick)="openEditModal(company)" class="mr-1" />
          <p-button label="Delete" [text]="true" severity="danger" size="small" (onClick)="confirmDelete(company)" />
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="4" class="text-center text-sm text-slate-500 py-8">
          No companies found. Add one to get started.
        </td>
      </tr>
    </ng-template>
  </p-table>

  @if (deleteError()) {
    <p-message severity="error" [closable]="false" class="mt-4">
      {{ deleteError() }}
    </p-message>
  }
</div>

<p-dialog
  [header]="editingCompany() ? 'Edit Company' : 'Add Company'"
  [(visible)]="modalOpen"
  [modal]="true"
  [style]="{ width: '32rem' }"
  (onHide)="closeModal()"
>
  <app-company-form
    [company]="editingCompany()"
    (saved)="onSaved()"
    (cancelled)="closeModal()"
  />
</p-dialog>
