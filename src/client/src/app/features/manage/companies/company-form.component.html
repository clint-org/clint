<form (ngSubmit)="onSubmit()" novalidate>
  @if (error()) {
    <p-message severity="error" [closable]="false" class="mb-4">
      {{ error() }}
    </p-message>
  }

  <app-form-field
    label="Name"
    fieldId="company-name"
    [required]="true"
    [error]="nameInvalid ? 'Name is required.' : null"
  >
    <input
      pInputText
      id="company-name"
      name="name"
      class="w-full"
      [ngModel]="name()"
      (ngModelChange)="name.set($event)"
      (blur)="nameBlurred.set(true)"
      [attr.aria-required]="true"
      [attr.aria-invalid]="nameInvalid"
      [attr.aria-describedby]="nameInvalid ? 'company-name-error' : null"
    />
  </app-form-field>

  <app-form-field label="Logo URL" fieldId="company-logo-url">
    <input
      pInputText
      id="company-logo-url"
      name="logoUrl"
      class="w-full"
      [ngModel]="logoUrl()"
      (ngModelChange)="logoUrl.set($event)"
      placeholder="https://..."
    />
  </app-form-field>

  <app-form-field label="Display Order" fieldId="company-display-order" spacing="mb-6">
    <p-inputnumber
      inputId="company-display-order"
      name="displayOrder"
      [ngModel]="displayOrder()"
      (ngModelChange)="displayOrder.set($event)"
      styleClass="w-full"
    />
  </app-form-field>

  <app-form-actions
    [submitLabel]="isEdit ? 'Update Company' : 'Create Company'"
    [loading]="submitting()"
    (cancelled)="cancelled.emit()"
  />
</form>
