<form (ngSubmit)="onSubmit()" novalidate>
  @if (error()) {
    <p-message severity="error" [closable]="false" class="mb-4">
      {{ error() }}
    </p-message>
  }

  <app-company-edit-form
    [(name)]="name"
    [(logoUrl)]="logoUrl"
    [(displayOrder)]="displayOrder"
    [nameInvalid]="nameInvalid"
    (nameBlur)="nameBlurred.set(true)"
  />

  <app-form-actions
    [submitLabel]="isEdit ? 'Update Company' : 'Create Company'"
    [loading]="submitting()"
    (cancelled)="cancelled.emit()"
  />
</form>
