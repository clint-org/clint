<app-manage-page-shell
  eyebrow="Manage"
  title="Therapeutic areas"
  [count]="areas().length"
  subtitle="Indication taxonomy used to classify trials in this space."
>
  <div actions>
    <p-button
      label="Add area"
      icon="fa-solid fa-plus"
      severity="secondary"
      [outlined]="true"
      size="small"
      (onClick)="openCreateModal()"
    />
  </div>

  <p-table
    styleClass="manage-table"
    [value]="areas()"
    [loading]="loading()"
    [tableStyle]="{ 'min-width': '36rem' }"
  >
    <ng-template #header>
      <tr>
        <th>Name</th>
        <th>Abbreviation</th>
        <th class="col-actions"></th>
      </tr>
    </ng-template>
    <ng-template #body let-area>
      <tr>
        <td>{{ area.name }}</td>
        <td class="col-identifier">{{ area.abbreviation ?? '--' }}</td>
        <td class="col-actions">
          <app-row-actions [items]="rowMenu(area)" [ariaLabel]="'Actions for ' + area.name" />
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="3">No therapeutic areas yet. Add one to get started.</td>
      </tr>
    </ng-template>
  </p-table>

  @if (deleteError()) {
    <p-message severity="error" [closable]="false" styleClass="mt-4">
      {{ deleteError() }}
    </p-message>
  }
</app-manage-page-shell>

<p-dialog
  [header]="editingArea() ? 'Edit therapeutic area' : 'Add therapeutic area'"
  [(visible)]="modalOpen"
  [modal]="true"
  [style]="{ width: '32rem' }"
  (onHide)="closeModal()"
>
  <app-therapeutic-area-form
    [area]="editingArea()"
    (saved)="onSaved()"
    (cancelled)="closeModal()"
  />
</p-dialog>
