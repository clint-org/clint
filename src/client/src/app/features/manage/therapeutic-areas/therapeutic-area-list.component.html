<app-manage-page-shell>
  <app-grid-toolbar [state]="grid" searchPlaceholder="Search therapeutic areas..." />

  <p-table
    styleClass="data-table"
    [value]="visibleAreas()"
    [loading]="loading()"
    [tableStyle]="{ 'min-width': '40rem' }"
    [lazy]="true"
    (onLazyLoad)="grid.onLazyLoad($any($event))"
    [paginator]="true"
    [rows]="grid.page().rows"
    [first]="grid.page().first"
    [totalRecords]="grid.totalRecords()"
    [rowsPerPageOptions]="[10, 25, 50, 100]"
    [filters]="grid.primengFilters()"
  >
    <ng-template #header>
      <tr>
        <th pSortableColumn="name">
          Name <p-sortIcon field="name" />
          <p-column-filter type="text" field="name" display="menu" />
        </th>
        <th pSortableColumn="abbreviation">
          Abbreviation <p-sortIcon field="abbreviation" />
          <p-column-filter type="text" field="abbreviation" display="menu" />
        </th>
        <th class="col-actions"></th>
      </tr>
    </ng-template>
    <ng-template #body let-area>
      <tr>
        <td><span [innerHTML]="area.name | highlight: grid.debouncedGlobalSearch()"></span></td>
        <td class="col-identifier">
          @if (area.abbreviation) {
            <span [innerHTML]="area.abbreviation | highlight: grid.debouncedGlobalSearch()"></span>
          } @else {
            --
          }
        </td>
        <td class="col-actions">
          <app-row-actions [items]="rowMenu(area)" [ariaLabel]="'Actions for ' + area.name" />
        </td>
      </tr>
    </ng-template>
    <ng-template #loadingbody>
      <app-table-skeleton-body
        [cells]="[
          { w: '52%' },
          { w: '52px', h: '11px' },
          { w: '14px', class: 'col-actions' },
        ]"
      />
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="3">
          @if (grid.isFiltered()) {
            No therapeutic areas match your filters.
          } @else {
            No therapeutic areas yet. Add one to get started.
          }
        </td>
      </tr>
    </ng-template>
  </p-table>

  @if (deleteError()) {
    <p-message severity="error" [closable]="false" styleClass="mt-4">
      {{ deleteError() }}
    </p-message>
  }
</app-manage-page-shell>

<p-dialog
  [header]="editingArea() ? 'Edit therapeutic area' : 'Add therapeutic area'"
  [(visible)]="modalOpen"
  [modal]="true"
  [style]="{ width: '32rem' }"
  (onHide)="closeModal()"
>
  @if (modalOpen()) {
    <app-therapeutic-area-form
      [area]="editingArea()"
      (saved)="onSaved()"
      (cancelled)="closeModal()"
    />
  }
</p-dialog>
