<form (ngSubmit)="onSubmit()" novalidate>
  @if (error()) {
    <p-message severity="error" [closable]="false" class="mb-4">{{ error() }}</p-message>
  }

  <div class="mb-4">
    <label for="ta-name" class="mb-1 block text-sm font-medium text-slate-700">Name</label>
    <input pInputText id="ta-name" class="w-full" [ngModel]="name()" (ngModelChange)="name.set($event)" (blur)="nameBlurred.set(true)" [attr.aria-required]="true" [attr.aria-invalid]="nameInvalid" />
    @if (nameInvalid) {
      <p class="mt-1 text-sm text-red-600">Name is required.</p>
    }
  </div>

  <div class="mb-6">
    <label for="ta-abbreviation" class="mb-1 block text-sm font-medium text-slate-700">Abbreviation</label>
    <input pInputText id="ta-abbreviation" class="w-full" [ngModel]="abbreviation()" (ngModelChange)="abbreviation.set($event)" />
  </div>

  <div class="flex justify-end gap-3">
    <p-button label="Cancel" severity="secondary" [outlined]="true" (onClick)="cancelled.emit()" />
    <p-button [label]="isEdit ? 'Update' : 'Create'" type="submit" [loading]="submitting()" />
  </div>
</form>
