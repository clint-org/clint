<form (ngSubmit)="onSubmit()" novalidate>
  @if (error()) {
    <p-message severity="error" [closable]="false" class="mb-4">{{ error() }}</p-message>
  }

  <app-form-field
    label="Name"
    fieldId="ta-name"
    [required]="true"
    [error]="nameInvalid ? 'Name is required.' : null"
  >
    <input
      pInputText
      id="ta-name"
      name="name"
      class="w-full"
      [ngModel]="name()"
      (ngModelChange)="name.set($event)"
      (blur)="nameBlurred.set(true)"
      [attr.aria-required]="true"
      [attr.aria-invalid]="nameInvalid"
    />
  </app-form-field>

  <app-form-field label="Abbreviation" fieldId="ta-abbreviation" spacing="mb-6">
    <input
      pInputText
      id="ta-abbreviation"
      name="abbreviation"
      class="w-full"
      [ngModel]="abbreviation()"
      (ngModelChange)="abbreviation.set($event)"
    />
  </app-form-field>

  <app-form-actions
    [submitLabel]="isEdit ? 'Update' : 'Create'"
    [loading]="submitting()"
    (cancelled)="cancelled.emit()"
  />
</form>
