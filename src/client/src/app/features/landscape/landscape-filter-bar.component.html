<div
  class="flex flex-wrap items-center gap-1.5 px-3 py-2 border-b border-slate-200 bg-white"
  role="toolbar"
  aria-label="Landscape filters"
>
  <p-multiselect
    [options]="moaOptions()"
    [ngModel]="filters().mechanismOfActionIds"
    (ngModelChange)="update('mechanismOfActionIds', $event)"
    placeholder="MOA"
    ariaLabel="Filter by mechanism of action"
    optionLabel="label"
    optionValue="value"
    display="comma"
    [filter]="true"
    [showClear]="true"
    styleClass="w-32"
    size="small"
  />
  <p-multiselect
    [options]="roaOptions()"
    [ngModel]="filters().routeOfAdministrationIds"
    (ngModelChange)="update('routeOfAdministrationIds', $event)"
    placeholder="ROA"
    ariaLabel="Filter by route of administration"
    optionLabel="label"
    optionValue="value"
    display="comma"
    [filter]="true"
    [showClear]="true"
    styleClass="w-32"
    size="small"
  />
  <p-multiselect
    [options]="companyOptions()"
    [ngModel]="filters().companyIds"
    (ngModelChange)="update('companyIds', $event)"
    placeholder="Company"
    ariaLabel="Filter by company"
    optionLabel="label"
    optionValue="value"
    display="comma"
    [filter]="true"
    [showClear]="true"
    styleClass="w-32"
    size="small"
  />
  <p-multiselect
    [options]="productOptions()"
    [ngModel]="filters().productIds"
    (ngModelChange)="update('productIds', $event)"
    placeholder="Product"
    ariaLabel="Filter by product"
    optionLabel="label"
    optionValue="value"
    display="comma"
    [filter]="true"
    [showClear]="true"
    styleClass="w-32"
    size="small"
  />
  <p-selectbutton
    [options]="phaseOptions"
    [ngModel]="filters().phases"
    (ngModelChange)="update('phases', $event)"
    [multiple]="true"
    optionLabel="label"
    optionValue="value"
    size="small"
  />
  <p-multiselect
    [options]="statusOptions()"
    [ngModel]="filters().recruitmentStatuses"
    (ngModelChange)="update('recruitmentStatuses', $event)"
    placeholder="Status"
    ariaLabel="Filter by recruitment status"
    optionLabel="label"
    optionValue="value"
    display="comma"
    [filter]="true"
    [showClear]="true"
    styleClass="w-32"
    size="small"
  />
  <p-multiselect
    [options]="studyTypeOptions()"
    [ngModel]="filters().studyTypes"
    (ngModelChange)="update('studyTypes', $event)"
    placeholder="Study type"
    ariaLabel="Filter by study type"
    optionLabel="label"
    optionValue="value"
    display="comma"
    [filter]="true"
    [showClear]="true"
    styleClass="w-32"
    size="small"
  />

  @if (hasAnyActive) {
    <p-button
      label="Clear"
      severity="secondary"
      [text]="true"
      size="small"
      (onClick)="clearAll()"
    />
  }
</div>
