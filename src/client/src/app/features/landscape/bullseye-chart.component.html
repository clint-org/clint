<svg
  viewBox="0 0 1000 1000"
  preserveAspectRatio="xMidYMid meet"
  role="img"
  [attr.aria-label]="ariaLabel()"
  class="bullseye-svg"
  (click)="onBackgroundClick()"
  (keydown.escape)="onBackgroundClick()"
>
  <desc>
    Concentric rings represent development phases from Launched at the center to Preclinical at the
    outer edge. Spokes are arranged clockwise from the top, each owning a wedge-shaped sector of the
    chart.
  </desc>

  <!-- alternating spoke sector wedges (drawn first so rings/spokes/dots layer on top) -->
  @for (sector of sectors(); track sector.spokeId) {
    <path [attr.d]="sector.path" [attr.fill]="sector.fill" stroke="none" />
  }

  <!-- alternating phase bands layered on top of sectors (additive slate tint) -->
  @for (band of bands(); track band.phase) {
    <path [attr.d]="band.path" [attr.fill]="band.fill" fill-rule="evenodd" stroke="none" />
  }

  <!-- rings -->
  @for (ring of rings(); track ring.devRank) {
    <circle
      [attr.cx]="cx"
      [attr.cy]="cy"
      [attr.r]="ring.radius"
      fill="none"
      [attr.stroke]="ring.isOuter ? '#94a3b8' : '#cbd5e1'"
      [attr.stroke-width]="ring.isOuter ? 2 : 1.5"
      [class.bullseye-ring-highlighted]="highlightedRing() === ring.phase"
    />
  }

  <!-- spokes -->
  @for (spoke of spokeLines(); track spoke.spokeId) {
    <line
      [attr.x1]="cx"
      [attr.y1]="cy"
      [attr.x2]="spoke.x2"
      [attr.y2]="spoke.y2"
      stroke="#e2e8f0"
      stroke-width="0.8"
    />
  }

  <!-- center disc (drawn before the inner ring label so the label sits on top) -->
  <circle [attr.cx]="cx" [attr.cy]="cy" [attr.r]="innerRadius - 4" fill="white" />
  <text
    [attr.x]="cx"
    [attr.y]="cy - 6"
    text-anchor="middle"
    fill="#0f172a"
    font-size="18"
    font-weight="700"
    letter-spacing="0.5"
  >
    {{ scopeName() }}
  </text>
  <text [attr.x]="cx" [attr.y]="cy + 16" text-anchor="middle" fill="#64748b" font-size="12">
    {{ productCountSummary() }}
  </text>

  <!-- spoke labels outside outer rim -->
  @for (label of spokeLabels(); track label.id) {
    <text
      [attr.x]="label.x"
      [attr.y]="label.y"
      [attr.text-anchor]="label.anchor"
      [attr.transform]="'rotate(' + label.rotate + ' ' + label.x + ' ' + label.y + ')'"
      fill="#334155"
      font-size="16"
      font-weight="600"
      letter-spacing="1.4"
      dominant-baseline="middle"
    >
      {{ label.name }}
    </text>
  }

  <!-- dots -->
  @for (dot of dots(); track dot.product.id) {
    <g class="bullseye-dot-group">
      <!-- Selection ring (existing) -->
      @if (selectedAssetId() === dot.product.id) {
        <circle
          [attr.cx]="dot.x"
          [attr.cy]="dot.y"
          [attr.r]="dotRadius(dot) + 6"
          fill="none"
          [attr.stroke]="dotFill(dot)"
          stroke-width="2"
          pointer-events="none"
        />
      }

      <!-- Activity pulse ring (amber, animated) -->
      @if (dot.product.has_recent_activity) {
        <circle
          [attr.cx]="dot.x"
          [attr.cy]="dot.y"
          r="10"
          fill="none"
          stroke="#f59e0b"
          stroke-width="2"
          class="activity-pulse"
        />
      }

      <!-- Intelligence halo ring (brand accent, static) -->
      @if (dot.product.intelligence_count > 0) {
        <circle
          [attr.cx]="dot.x"
          [attr.cy]="dot.y"
          r="12"
          fill="none"
          stroke="var(--brand-600, #0d9488)"
          stroke-width="2"
          opacity="0.8"
          class="halo-ring"
        />
      }

      <!-- Duplicate (multi-spoke) dashed ring -->
      @if (isDuplicate(dot.product.id)) {
        <circle
          [attr.cx]="dot.x"
          [attr.cy]="dot.y"
          [attr.r]="dot.product.intelligence_count > 0 ? 17 : 12"
          fill="none"
          stroke="#475569"
          stroke-dasharray="3 2"
          stroke-width="1.5"
          class="dup-ring"
        />
      }

      <!-- Main dot -->
      <circle
        [attr.cx]="dot.x"
        [attr.cy]="dot.y"
        [attr.r]="dotRadius(dot)"
        [attr.fill]="dotFill(dot)"
        [attr.opacity]="dotOpacity(dot)"
        [attr.stroke]="
          isHighlighted(dot.product.id)
            ? '#0f172a'
            : isAssetMatched(dot.product.id)
              ? 'white'
              : '#cbd5e1'
        "
        [attr.stroke-width]="isHighlighted(dot.product.id) ? 2 : 1.5"
        [attr.tabindex]="isAssetMatched(dot.product.id) ? 0 : -1"
        role="button"
        class="bullseye-dot"
        [class.bullseye-dot-faded]="!isAssetMatched(dot.product.id)"
        [attr.aria-label]="dotAriaLabel(dot)"
        (click)="isAssetMatched(dot.product.id) && onDotClick($event, dot.product.id)"
        (mouseenter)="isAssetMatched(dot.product.id) && onDotMouseEnter(dot.product.id)"
        (mouseleave)="isAssetMatched(dot.product.id) && onDotMouseLeave()"
        (focus)="isAssetMatched(dot.product.id) && onDotMouseEnter(dot.product.id)"
        (blur)="isAssetMatched(dot.product.id) && onDotMouseLeave()"
        (keydown)="isAssetMatched(dot.product.id) && onDotKeydown($event, dot.product.id)"
      />
    </g>
  }

  <!-- ring labels at the 12 o'clock gutter, drawn last so they sit above the
       dots that share that gutter. LAUNCHED is omitted — the center disc with
       the scope name is the clearer anchor for the innermost position. Each
       label gets a semi-opaque slate-tinted halo so the phase-colored monospace
       text stays legible over any dot it overlaps; the dots are never moved. -->
  @for (label of ringLabels(); track 'label-' + label.phase) {
    <g class="ring-label-group">
      <rect
        [attr.x]="label.haloX"
        [attr.y]="label.haloY"
        [attr.width]="label.haloW"
        [attr.height]="label.haloH"
        rx="3"
        fill="rgba(255, 255, 255, 0.82)"
        stroke="rgba(148, 163, 184, 0.45)"
        stroke-width="0.75"
        pointer-events="none"
      />
      <text
        [attr.x]="label.x"
        [attr.y]="label.y"
        [attr.fill]="label.fill"
        font-size="13"
        font-weight="600"
        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
        letter-spacing="1.2"
        pointer-events="none"
      >
        {{ label.text }}
      </text>
    </g>
  }
</svg>
